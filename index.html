<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mimory</title>
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Mimory — умный планировщик задач">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4ff;
  --surface: #ffffff;
  --surface2: #eeecff;
  --text: #1a1730;
  --text2: #7b78a8;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --success: #22c55e;
  --danger: #ef4444;
  --border: rgba(108,99,255,0.13);
  --shadow: 0 2px 16px rgba(108,99,255,0.09);
  --shadow-lg: 0 8px 40px rgba(108,99,255,0.18);
  --r: 16px; --rs: 10px;
  --c0:#cbd5e1; --c1:#ef4444; --c2:#ec4899; --c3:#22c55e;
  --c4:#f97316; --c5:#3b82f6; --c6:#eab308; --c7:#64748b;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d0c1a; --surface:#171530; --surface2:#1f1d38;
  --text:#ede9ff; --text2:#8b88b8;
  --border:rgba(108,99,255,0.18);
  --shadow:0 2px 16px rgba(0,0,0,0.35);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.5);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
.hdr{padding:14px 18px 10px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.hdr-btns{display:flex;gap:8px;align-items:center}
.lang-btn{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;padding:4px 10px;border-radius:20px;border:2px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:all .2s;letter-spacing:.3px}
.lang-btn:hover{background:var(--accent);color:#fff}
.search-btn{width:34px;height:34px;border-radius:10px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.color-filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.color-filters::-webkit-scrollbar{display:none}
.cdot{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .2s,border-color .2s}
.cdot.on{border-color:var(--text);transform:scale(1.18)}
.cdot:hover{transform:scale(1.1)}

/* PAGES */
.page{flex:1;overflow-y:auto;padding:10px 14px 80px;display:none}
.page.active{display:block}

/* SECTIONS */
.sec-hdr{display:flex;align-items:center;gap:7px;padding:10px 2px 5px}
.sec-lbl{font-size:10.5px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--text2)}
.sec-lbl.ov{color:var(--danger)} .sec-lbl.td{color:var(--accent)}
.sec-cnt{font-size:10px;font-weight:700;color:var(--text2);background:var(--surface2);padding:2px 7px;border-radius:20px}

/* TASK CARD */
.tcard{background:var(--surface);border-radius:var(--r);padding:13px 14px 13px 18px;margin-bottom:7px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;animation:si .28s ease forwards}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tcard:active{transform:scale(0.975)}
.tcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;background:var(--tc,var(--c0))}
.tcard.ov{background:linear-gradient(to right,rgba(239,68,68,0.06),var(--surface))}
.tcard.done{opacity:.52} .tcard.done .ttitle{text-decoration:line-through}

/* CHECKBOX */
.tchk{width:22px;height:22px;border-radius:7px;border:2.5px solid var(--tc,var(--c0));display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s;background:transparent;margin-top:1px}
.tcard.done .tchk{background:var(--tc,var(--c0))}
.tchk svg{opacity:0;transition:opacity .2s}
.tcard.done .tchk svg{opacity:1}
.tbody{flex:1;min-width:0}
.ttitle{font-size:14.5px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.tmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tdate{font-size:11.5px;color:var(--text2);display:flex;align-items:center;gap:3px}
.tdate.ov{color:var(--danger);font-weight:700}
.trep{font-size:10.5px;color:var(--accent);background:rgba(108,99,255,0.1);padding:2px 7px;border-radius:10px;font-weight:700}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;text-align:center}
.empty-ico{font-size:52px;opacity:.35}
.empty-txt{font-size:14px;color:var(--text2);font-weight:600}

/* FAB */
.fab-wrap{position:fixed;bottom:20px;right:18px;display:flex;flex-direction:column-reverse;gap:10px;align-items:flex-end;z-index:50}
.fab{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#8b80ff);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(108,99,255,.42);transition:transform .2s}
.fab:active{transform:scale(.9)}
.fab-v{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent2),#ff8fa3);color:#fff;border:none;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 14px rgba(255,101,132,.38);transition:transform .2s}
.fab-v.rec{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 14px rgba(255,101,132,.38)}50%{box-shadow:0 4px 24px rgba(255,101,132,.7);transform:scale(1.07)}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:40}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;background:none;border:none;cursor:pointer;color:var(--text2);font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;transition:color .2s;letter-spacing:.2px}
.nbtn.on{color:var(--accent)}
.nbtn svg{width:22px;height:22px}
.nbadge{background:var(--danger);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;position:relative;top:-1px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.modal{width:100%;max-width:480px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;padding:16px 18px max(20px,env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-height:92vh;overflow-y:auto}
.overlay.open .modal{transform:translateY(0)}
.mhandle{width:38px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
.mtitle{font-size:17px;font-weight:800;margin-bottom:16px}

/* FIELDS */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;font-size:14.5px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cpicker{display:flex;gap:7px;flex-wrap:wrap}
.copt{width:30px;height:30px;border-radius:9px;border:3px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s}
.copt.on{border-color:var(--text);transform:scale(1.12)}

/* REPEAT */
.rep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.rbtn{padding:8px 4px;border-radius:var(--rs);border:2px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.rbtn.on{border-color:var(--accent);background:rgba(108,99,255,.1);color:var(--accent)}
.custom-rep{display:none;margin-top:9px}
.custom-rep.show{display:block}

/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.trow-lbl{font-size:13.5px;font-weight:600}
.tog{width:42px;height:24px;border-radius:12px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 2px 5px rgba(0,0,0,.18)}
.tog.on::after{transform:translateX(18px)}

/* BUTTONS */
.btn-ok{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--accent),#8b80ff);color:#fff;font-family:'Nunito',sans-serif;font-size:15.5px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(108,99,255,.35);margin-top:16px;transition:transform .15s}
.btn-ok:active{transform:scale(.98)}
.btn-del{width:100%;padding:11px;border-radius:var(--r);border:2px solid var(--danger);background:transparent;color:var(--danger);font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;margin-top:7px}

/* NOTIF POPUP */
.npop{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-130px);background:var(--surface);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow-lg);border:1px solid var(--border);z-index:200;width:calc(100% - 32px);max-width:420px;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.npop.show{transform:translateX(-50%) translateY(0)}
.npop-title{font-size:15px;font-weight:800;margin-bottom:3px}
.npop-body{font-size:12px;color:var(--text2);margin-bottom:10px}
.npop-btns{display:flex;gap:7px}
.npop-btn{flex:1;padding:8px;border-radius:var(--rs);border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.npop-done{background:var(--accent);color:#fff}
.npop-later{background:var(--surface2);color:var(--text2)}

/* VOICE */
.voice-ind{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);background:var(--surface);border-radius:20px;padding:9px 18px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:700;color:var(--accent2);z-index:60;display:none;align-items:center;gap:7px}
.voice-ind.show{display:flex}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* SETTINGS */
.spage{padding:16px 14px 80px}
.ssec{margin-bottom:20px}
.ssec-title{font-size:10.5px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--text2);margin-bottom:9px;padding-left:4px}
.scard{background:var(--surface);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.sitem:last-child{border-bottom:none}
.sitem:active{background:var(--surface2)}
.sitem-l{display:flex;align-items:center;gap:11px}
.sico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sitem-name{font-size:13.5px;font-weight:700}
.sitem-desc{font-size:11.5px;color:var(--text2);margin-top:1px}
.sitem-arrow{color:var(--text2);font-size:14px}

/* SEARCH BOX */
.search-box{display:none;padding:0 14px 10px;background:var(--surface);border-bottom:1px solid var(--border)}
.search-box.open{display:block}
.search-input{width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-top">
      <span class="logo">Mimory</span>
      <div class="hdr-btns">
        <button class="search-btn" onclick="toggleSearch()" title="Поиск">🔍</button>
        <button class="lang-btn" id="langBtn" onclick="toggleLang()">RO</button>
      </div>
    </div>
    <div class="color-filters" id="colorFilters"></div>
  </div>

  <!-- SEARCH -->
  <div class="search-box" id="searchBox">
    <input class="search-input" id="searchInput" placeholder="Поиск задач..." oninput="render()">
  </div>

  <!-- PAGES -->
  <div class="page active" id="pageActive"></div>
  <div class="page" id="pageDone"></div>
  <div class="page" id="pageSettings"></div>

  <!-- BOTTOM NAV -->
  <div class="bnav">
    <button class="nbtn on" id="nb0" onclick="goPage(0)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span data-i="nav_tasks">Задачи</span>
    </button>
    <button class="nbtn" id="nb1" onclick="goPage(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/><line x1="5" y1="12" x2="9" y2="12"/><line x1="5" y1="16" x2="7" y2="16"/></svg>
      <span data-i="nav_done">Выполнено</span>
    </button>
    <button class="nbtn" id="nb2" onclick="goPage(2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M17.66 17.66l-1.41-1.41M6.34 17.66l1.41-1.41"/></svg>
      <span data-i="nav_settings">Настройки</span>
    </button>
  </div>

  <!-- FAB -->
  <div class="fab-wrap">
    <button class="fab" onclick="openModal()" title="Добавить задачу">＋</button>
    <button class="fab-v" id="fabVoice" onclick="startVoice()" title="Голосом">🎤</button>
  </div>

  <!-- VOICE INDICATOR -->
  <div class="voice-ind" id="voiceInd">
    <span class="vdot"></span>
    <span id="voiceText">Говорите...</span>
  </div>

  <!-- NOTIFICATION POPUP -->
  <div class="npop" id="npop">
    <div class="npop-title" id="npopTitle"></div>
    <div class="npop-body" id="npopBody">⏰ Напоминание</div>
    <div class="npop-btns">
      <button class="npop-btn npop-later" onclick="snoozeTask()">⏰ Позже</button>
      <button class="npop-btn npop-done" onclick="doneFromPopup()" data-i="done">Выполнено</button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="overlay" id="overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <div class="mhandle"></div>
      <div class="mtitle" id="modalTitle" data-i="add_task">Новая задача</div>

      <div class="field">
        <label data-i="label_name">Название</label>
        <input id="fName" type="text" placeholder="Название задачи..." autocomplete="off">
      </div>

      <div class="field frow">
        <div>
          <label data-i="label_date">Дата</label>
          <input id="fDate" type="date">
        </div>
        <div>
          <label data-i="label_time">Время</label>
          <input id="fTime" type="time">
        </div>
      </div>

      <div class="field">
        <label data-i="label_color">Цвет</label>
        <div class="cpicker" id="colorPicker"></div>
      </div>

      <div class="field">
        <label data-i="label_repeat">Повтор</label>
        <div class="rep-grid" id="repGrid"></div>
        <div class="custom-rep" id="customRep">
          <div class="frow">
            <div>
              <label data-i="label_every">Каждые</label>
              <input id="fRepN" type="number" min="1" max="999" value="2" placeholder="N">
            </div>
            <div>
              <label data-i="label_unit">Единица</label>
              <select id="fRepUnit">
                <option value="h" data-i="unit_h">часов</option>
                <option value="d" selected data-i="unit_d">дней</option>
                <option value="w" data-i="unit_w">недель</option>
                <option value="m" data-i="unit_m">месяцев</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="trow">
        <span class="trow-lbl" data-i="label_notif">Напоминание</span>
        <div class="tog" id="togNotif" onclick="toggleTog(this)"></div>
      </div>

      <button class="btn-ok" id="btnSave" onclick="saveTask()">
        <span data-i="save">Сохранить</span>
      </button>
      <button class="btn-del" id="btnDel" onclick="deleteTask()" style="display:none" data-i="delete">
        Удалить задачу
      </button>
    </div>
  </div>

</div>

<script>
// ===== I18N =====
const T = {
  ru: {
    nav_tasks:'Задачи', nav_done:'Выполнено', nav_settings:'Настройки',
    add_task:'Новая задача', edit_task:'Редактировать',
    label_name:'Название', label_date:'Дата', label_time:'Время',
    label_color:'Цвет', label_repeat:'Повтор', label_notif:'Напоминание',
    label_every:'Каждые', label_unit:'Единица',
    save:'Сохранить', delete:'Удалить задачу', done:'Выполнено',
    sec_overdue:'Просроченные', sec_today:'Сегодня', sec_week:'Эта неделя',
    sec_nodate:'Без срока', sec_done:'Выполненные задачи',
    empty_active:'Нет задач 🎉', empty_done:'Ничего не выполнено пока',
    rep_none:'Не повт.', rep_daily:'Каждый день', rep_workdays:'Будни',
    rep_weekly:'Каждую нед.', rep_monthly:'Каждый мес.', rep_yearly:'Каждый год', rep_custom:'Свой интервал',
    unit_h:'часов', unit_d:'дней', unit_w:'недель', unit_m:'месяцев',
    voice_listen:'Говорите...', voice_notsup:'Голос не поддерживается',
    exp_ok:'Данные экспортированы!', imp_ok:'Данные импортированы!',
    notif_req:'Разрешите уведомления для напоминаний',
    snooze:'Напоминание отложено на 10 мин.',
    settings_export:'Экспорт данных', settings_import:'Импорт данных',
    settings_notif:'Уведомления', settings_clear:'Очистить выполненные',
    settings_about:'О приложении', settings_data:'Данные', settings_reminder:'Напоминания',
    settings_notif_desc:'Push-уведомления', settings_export_desc:'Сохранить в JSON файл',
    settings_import_desc:'Загрузить из файла', settings_clear_desc:'Удалить завершённые задачи',
    about_ver:'Версия 1.0.0 — Mimory', about_desc:'Умный планировщик задач'
  },
  ro: {
    nav_tasks:'Sarcini', nav_done:'Efectuate', nav_settings:'Setări',
    add_task:'Sarcină nouă', edit_task:'Editare',
    label_name:'Titlu', label_date:'Dată', label_time:'Timp',
    label_color:'Culoare', label_repeat:'Repetare', label_notif:'Reamintire',
    label_every:'Fiecare', label_unit:'Unitate',
    save:'Salvează', delete:'Șterge sarcina', done:'Efectuat',
    sec_overdue:'Expirate', sec_today:'Astăzi', sec_week:'Această săptămână',
    sec_nodate:'Fără termen', sec_done:'Sarcini efectuate',
    empty_active:'Nicio sarcină 🎉', empty_done:'Nimic efectuat încă',
    rep_none:'Nu repet.', rep_daily:'Zilnic', rep_workdays:'Zile lucrătoare',

let lang = localStorage.getItem('mimory_lang') || 'ru';
const t = k => (T[lang][k] || T.ru[k] || k);

function applyLang() {
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.getAttribute('data-i');
    el.textContent = t(k);
  });
  document.getElementById('langBtn').textContent = lang === 'ru' ? 'RO' : 'RU';
  document.getElementById('searchInput').placeholder = lang === 'ru' ? 'Поиск задач...' : 'Caută sarcini...';
  renderRepGrid();
  renderColorFilters();
}
function toggleLang() {
  lang = lang === 'ru' ? 'ro' : 'ru';
  localStorage.setItem('mimory_lang', lang);
  applyLang();
  render();
  if (curPage === 2) renderSettings();
}

// ===== STATE =====
const COLORS = [
  {id:'c0',hex:'#cbd5e1'},{id:'c1',hex:'#ef4444'},{id:'c2',hex:'#ec4899'},
  {id:'c3',hex:'#22c55e'},{id:'c4',hex:'#f97316'},{id:'c5',hex:'#3b82f6'},
  {id:'c6',hex:'#eab308'},{id:'c7',hex:'#64748b'}
];
const REPEATS = ['none','daily','workdays','weekly','monthly','yearly','custom'];

let tasks = [];
let editId = null;
let filterColor = null;
let curPage = 0;
let notifPopupTaskId = null;
let checkInterval = null;

function load() {
  try { tasks = JSON.parse(localStorage.getItem('mimory_tasks') || '[]'); } catch(e) { tasks = []; }
}
function save() { localStorage.setItem('mimory_tasks', JSON.stringify(tasks)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===== DATE HELPERS =====
function now() { return new Date(); }
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function endOfWeek() { const d=today(); d.setDate(d.getDate()+(6-d.getDay())+1); return d; }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const months = lang==='ru'
    ? ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек']
    : ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec'];
  const dd = d.getDate(), mm = months[d.getMonth()];
  const hh = String(d.getHours()).padStart(2,'0'), min = String(d.getMinutes()).padStart(2,'0');
  return `${dd} ${mm} ${hh}:${min}`;
}
function isOverdue(task) {
  if (!task.datetime || task.done) return false;
  return new Date(task.datetime) < now();
}
function isToday(task) {
  if (!task.datetime) return false;
  const d = new Date(task.datetime);
  const t2 = today(), t3 = new Date(t2); t3.setDate(t3.getDate()+1);
  return d >= t2 && d < t3;
}
function isThisWeek(task) {
  if (!task.datetime) return false;
  const d = new Date(task.datetime);
  return d >= today() && d < endOfWeek();
}

// ===== RENDER =====
function render() {
  if (curPage === 0) renderActive();
  else if (curPage === 1) renderDone();
}

function filterTasks(list) {
  let res = list;
  if (filterColor) res = res.filter(t => t.color === filterColor);
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (q) res = res.filter(t => t.name.toLowerCase().includes(q));
  return res;
}

function renderActive() {
  const active = filterTasks(tasks.filter(t => !t.done));
  const overdue = active.filter(t => isOverdue(t));
  const todayT = active.filter(t => !isOverdue(t) && isToday(t));
  const week = active.filter(t => !isOverdue(t) && isThisWeek(t) && !isToday(t));
  const nodate = active.filter(t => !t.datetime);

  let html = '';
  if (overdue.length) html += section('ov', t('sec_overdue'), overdue, true);
  if (todayT.length) html += section('td', t('sec_today'), todayT, false);
  if (week.length) html += section('', t('sec_week'), week, false);
  if (nodate.length) html += section('', t('sec_nodate'), nodate, false);
  if (!active.length) html = `<div class="empty"><div class="empty-ico">✅</div><div class="empty-txt">${t('empty_active')}</div></div>`;

  document.getElementById('pageActive').innerHTML = html;
}

function renderDone() {
  const done = filterTasks(tasks.filter(t => t.done));
  let html = '';
  if (done.length) html += section('', t('sec_done'), done, false);
  else html = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">${t('empty_done')}</div></div>`;
  document.getElementById('pageDone').innerHTML = html;
}

function section(cls, label, list, isOverdue) {
  let h = `<div class="sec-hdr"><span class="sec-lbl ${cls}">${label}</span><span class="sec-cnt">${list.length}</span></div>`;
  list.forEach(tk => { h += taskCard(tk, isOverdue); });
  return h;
}

function taskCard(tk, forceOv) {
  const col = COLORS.find(c => c.id === tk.color) || COLORS[0];
  const ov = forceOv || isOverdue(tk);
  const repLabel = tk.repeat && tk.repeat !== 'none' ? `<span class="trep">${repStr(tk)}</span>` : '';
  const dateLabel = tk.datetime ? `<span class="tdate ${ov?'ov':''}">${ov?'⚠ ':'📅 '}${fmtDate(tk.datetime)}</span>` : '';
  const doneClass = tk.done ? 'done' : '';
  const ovClass = ov && !tk.done ? 'ov' : '';
  return `<div class="tcard ${doneClass} ${ovClass}" style="--tc:${col.hex}" onclick="openModal('${tk.id}')">
    <div class="tchk" onclick="event.stopPropagation();toggleDone('${tk.id}')">
      <svg width="12" height="10" viewBox="0 0 12 10" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="1 5 4.5 8.5 11 1"/></svg>
    </div>
    <div class="tbody">
      <div class="ttitle">${escHtml(tk.name)}</div>
      <div class="tmeta">${dateLabel}${repLabel}</div>
    </div>
  </div>`;
}

function repStr(tk) {
  if (!tk.repeat || tk.repeat==='none') return '';
  if (tk.repeat==='custom') {
    const u = {h:t('unit_h'),d:t('unit_d'),w:t('unit_w'),m:t('unit_m')};
    return `↻ ${tk.repN||2} ${u[tk.repUnit||'d']}`;
  }
  const map = {daily:t('rep_daily'),workdays:t('rep_workdays'),weekly:t('rep_weekly'),monthly:t('rep_monthly'),yearly:t('rep_yearly')};
  return `↻ ${map[tk.repeat]||tk.repeat}`;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== COLOR FILTERS =====
function renderColorFilters() {
  const el = document.getElementById('colorFilters');
  let h = `<div class="cdot ${!filterColor?'on':''}" style="background:linear-gradient(135deg,#a78bfa,#f472b6)" onclick="setFilter(null)" title="Все"></div>`;
  COLORS.slice(1).forEach(c => {
    h += `<div class="cdot ${filterColor===c.id?'on':''}" style="background:${c.hex}" onclick="setFilter('${c.id}')"></div>`;
  });
  el.innerHTML = h;
}
function setFilter(id) { filterColor = id; renderColorFilters(); render(); }

// ===== NAVIGATION =====
function goPage(n) {
  curPage = n;
  ['pageActive','pageDone','pageSettings'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active', i===n);
  });
  [0,1,2].forEach(i => document.getElementById('nb'+i).classList.toggle('on', i===n));
  if (n===2) renderSettings();
  else render();
}

// ===== MODAL =====
function openModal(id) {
  editId = id || null;
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  const tk = id ? tasks.find(t=>t.id===id) : null;

  document.getElementById('modalTitle').textContent = tk ? t('edit_task') : t('add_task');
  document.getElementById('fName').value = tk ? tk.name : '';

  const now2 = new Date();
  if (tk && tk.datetime) {
    const d = new Date(tk.datetime);
    document.getElementById('fDate').value = d.toISOString().split('T')[0];
    document.getElementById('fTime').value = d.toTimeString().slice(0,5);
  } else {
    document.getElementById('fDate').value = now2.toISOString().split('T')[0];
    document.getElementById('fTime').value = String(now2.getHours()).padStart(2,'0')+':'+String(now2.getMinutes()).padStart(2,'0');
  }

  renderColorPicker(tk ? tk.color : 'c0');
  renderRepGrid(tk ? tk.repeat : 'none', tk);
  setTog('togNotif', tk ? tk.notif : true);
  document.getElementById('btnDel').style.display = tk ? 'block' : 'none';

  overlay.classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(), 400);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target===document.getElementById('overlay')) closeModal(); }

function renderColorPicker(sel) {
  let h = '';
  COLORS.forEach(c => {
    h += `<div class="copt ${sel===c.id?'on':''}" style="background:${c.hex}" onclick="pickColor('${c.id}')"></div>`;
  });
  document.getElementById('colorPicker').innerHTML = h;
}
function pickColor(id) { renderColorPicker(id); }
function getPickedColor() {
  const el = document.querySelector('.copt.on');
  return el ? COLORS.findIndex(c=>el.style.background.includes(c.hex.slice(1)))>=0 ? COLORS.find(c=>el.style.background===c.hex||el.style.background.includes(c.hex.slice(1)))?.id : 'c0' : 'c0';
}

function renderRepGrid(sel, tk) {
  const reps = ['none','daily','workdays','weekly','monthly','yearly','custom'];
  const labels = reps.map(r => t('rep_'+r));
  let h = '';
  reps.forEach((r,i) => {
    h += `<button class="rbtn ${(sel||'none')===r?'on':''}" onclick="pickRep('${r}')">${labels[i]}</button>`;
  });
  document.getElementById('repGrid').innerHTML = h;
  const custom = document.getElementById('customRep');
  custom.classList.toggle('show', sel==='custom');
  if (tk && tk.repN) document.getElementById('fRepN').value = tk.repN;
  if (tk && tk.repUnit) document.getElementById('fRepUnit').value = tk.repUnit;
}
function pickRep(r) {
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById('customRep').classList.toggle('show', r==='custom');
}
function getPickedRep() {
  const el = document.querySelector('.rbtn.on');
  return el ? REPEATS.find(r=>el.textContent===t('rep_'+r)) || 'none' : 'none';
}

function toggleTog(el) { el.classList.toggle('on'); }
function setTog(id, val) { document.getElementById(id).classList.toggle('on', val); }
function getTog(id) { return document.getElementById(id).classList.contains('on'); }

function saveTask() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { document.getElementById('fName').focus(); return; }

  const dateVal = document.getElementById('fDate').value;
  const timeVal = document.getElementById('fTime').value;
  let datetime = null;
  if (dateVal && timeVal) datetime = new Date(dateVal+'T'+timeVal).toISOString();
  else if (dateVal) datetime = new Date(dateVal).toISOString();

  const color = getPickedColor();
  const repeat = getPickedRep();
  const repN = parseInt(document.getElementById('fRepN').value)||2;
  const repUnit = document.getElementById('fRepUnit').value;
  const notif = getTog('togNotif');

  if (editId) {
    const idx = tasks.findIndex(t=>t.id===editId);
    if (idx>=0) Object.assign(tasks[idx], {name,datetime,color,repeat,repN,repUnit,notif});
  } else {
    tasks.push({id:genId(),name,datetime,color,repeat,repN,repUnit,notif,done:false,createdAt:new Date().toISOString()});
  }
  save(); closeModal(); render();
  if (notif && datetime) scheduleNotif();
}

function deleteTask() {
  if (!editId) return;
  tasks = tasks.filter(t=>t.id!==editId);
  save(); closeModal(); render();
}

function toggleDone(id) {
  const tk = tasks.find(t=>t.id===id);
  if (!tk) return;
  tk.done = !tk.done;
  if (tk.done && tk.repeat && tk.repeat!=='none' && tk.datetime) {
    // Advance to next occurrence
    const next = nextOccurrence(tk);
    if (next) {
      tasks.push({...tk, id:genId(), done:false, datetime:next.toISOString(), createdAt:new Date().toISOString()});
    }
  }
  save(); render();
}

function nextOccurrence(tk) {
  const d = new Date(tk.datetime);
  const n = new Date();
  if (tk.repeat==='daily') { d.setDate(d.getDate()+1); }
  else if (tk.repeat==='workdays') { do { d.setDate(d.getDate()+1); } while(d.getDay()===0||d.getDay()===6); }
  else if (tk.repeat==='weekly') { d.setDate(d.getDate()+7); }
  else if (tk.repeat==='monthly') { d.setMonth(d.getMonth()+1); }
  else if (tk.repeat==='yearly') { d.setFullYear(d.getFullYear()+1); }
  else if (tk.repeat==='custom') {
    const u = tk.repUnit||'d', n2 = tk.repN||1;
    if (u==='h') d.setHours(d.getHours()+n2);
    else if (u==='d') d.setDate(d.getDate()+n2);
    else if (u==='w') d.setDate(d.getDate()+n2*7);
    else if (u==='m') d.setMonth(d.getMonth()+n2);
  }
  return d > n ? d : null;
}

// ===== NOTIFICATIONS =====
function scheduleNotif() {
  if (Notification.permission === 'default') Notification.requestPermission();
}

function checkReminders() {
  if (document.hidden) return;
  const n = now();
  tasks.filter(tk => !tk.done && tk.notif && tk.datetime).forEach(tk => {
    const d = new Date(tk.datetime);
    const diff = d - n;
    if (diff > -60000 && diff < 30000) {
      showNotifPopup(tk);
    }
  });
}

function showNotifPopup(tk) {
  if (notifPopupTaskId === tk.id) return;
  notifPopupTaskId = tk.id;
  document.getElementById('npopTitle').textContent = tk.name;
  document.getElementById('npop').classList.add('show');

  if (Notification.permission === 'granted') {
    new Notification('Mimory — ' + tk.name, { body: '⏰ ' + fmtDate(tk.datetime), icon: '' });
  }

  setTimeout(()=>{ document.getElementById('npop').classList.remove('show'); notifPopupTaskId=null; }, 8000);
}

function doneFromPopup() {
  if (notifPopupTaskId) toggleDone(notifPopupTaskId);
  document.getElementById('npop').classList.remove('show');
  notifPopupTaskId = null;
}
function snoozeTask() {
  if (notifPopupTaskId) {
    const tk = tasks.find(t=>t.id===notifPopupTaskId);
    if (tk) { const d=new Date(); d.setMinutes(d.getMinutes()+10); tk.datetime=d.toISOString(); save(); render(); }
  }
  document.getElementById('npop').classList.remove('show');
  notifPopupTaskId = null;
}

// ===== VOICE =====
let recognition = null;
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert(t('voice_notsup')); return; }
  if (recognition) { recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = lang === 'ru' ? 'ru-RU' : 'ro-RO';
  recognition.interimResults = false;
  recognition.onstart = () => {
    document.getElementById('fabVoice').classList.add('rec');
    document.getElementById('voiceInd').classList.add('show');
    document.getElementById('voiceText').textContent = t('voice_listen');
  };
  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    openModal();
    setTimeout(()=>{ document.getElementById('fName').value = text; }, 300);
  };
  recognition.onerror = recognition.onend = () => {
    document.getElementById('fabVoice').classList.remove('rec');
    document.getElementById('voiceInd').classList.remove('show');
    recognition = null;
  };
  recognition.start();
}

// ===== SEARCH =====
function toggleSearch() {
  const sb = document.getElementById('searchBox');
  sb.classList.toggle('open');
  if (sb.classList.contains('open')) document.getElementById('searchInput').focus();
  else { document.getElementById('searchInput').value=''; render(); }
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const data = JSON.stringify({version:'1.0',tasks}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mimory_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
function importData() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.tasks) { tasks = d.tasks; save(); render(); alert(t('imp_ok')); }
      } catch { alert('Ошибка файла'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function clearDone() {
  tasks = tasks.filter(t=>!t.done);
  save(); render(); if(curPage===2) renderSettings();
}
function requestNotifPermission() {
  if ('Notification' in window) Notification.requestPermission().then(p=>{ alert(p==='granted'?'✅ Разрешено':'❌ Отклонено'); });
}

// ===== PWA SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='mimory-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./','./?pwa=1']))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))) ));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ===== INIT =====
load();
renderColorFilters();
applyLang();
render();
checkInterval = setInterval(checkReminders, 30000);
if (Notification.permission === 'default') setTimeout(()=>Notification.requestPermission(), 2000);
</script>
