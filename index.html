<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mimory</title>
<meta name="theme-color" content="#1a9daa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Mimory — умный планировщик задач">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   CSS VARIABLES
════════════════════════════════════════ */
:root {
  --color-primary:       #1a9daa;
  --color-primary-dark:  #158896;
  --color-primary-light: #e4f7f9;
  --color-danger:        #e53935;
  --color-danger-light:  #fff0f0;
  --color-text:          #1c1c1c;
  --color-text-muted:    #777;
  --color-text-dim:      #bbb;
  --color-bg:            #f0f0f0;
  --color-surface:       #fff;
  --color-border:        #e0e0e0;
  /* task colors */
  --task-color-default:  #ccc;
  --task-color-red:      #e53935;
  --task-color-pink:     #d81b60;
  --task-color-green:    #43a047;
  --task-color-orange:   #f4511e;
  --task-color-blue:     #3949ab;
  --task-color-yellow:   #f9a825;
  --task-color-gray:     #546e7a;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-bg:            #111;
    --color-surface:       #1e1e1e;
    --color-text:          #eee;
    --color-text-muted:    #999;
    --color-border:        #2e2e2e;
    --color-primary-light: #0d2f32;
    --color-danger-light:  #2a1010;
  }
}

/* ════════════════════════════════════════
   RESET
════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  background: var(--color-bg);
  color: var(--color-text);
  overflow: hidden;
  font-family: 'Roboto', sans-serif;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
.header {
  background: var(--color-primary);
  padding: 10px 14px 0;
  z-index: 20;
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 8px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: .3px;
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.icon-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,.9);
  cursor: pointer;
  padding: 5px;
  font-size: 19px;
  line-height: 1;
  border-radius: 6px;
  transition: background .15s;
}
.icon-btn:active { background: rgba(255,255,255,.15); }

.lang-btn {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,.7);
  background: transparent;
  color: #fff;
  cursor: pointer;
  letter-spacing: .3px;
}

/* Color filter dots */
.color-filters {
  display: flex;
  gap: 7px;
  padding: 5px 0 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.color-filters::-webkit-scrollbar { display: none; }

.color-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform .15s, border-color .15s;
}
.color-dot.selected {
  border-color: #fff;
  transform: scale(1.2);
}

/* Search bar */
.search-bar {
  background: var(--color-primary-dark);
  padding: 0 14px 8px;
  display: none;
}
.search-bar.open { display: block; }

.search-input {
  width: 100%;
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,.2);
  color: #fff;
  font-size: 14px;
  outline: none;
}
.search-input::placeholder { color: rgba(255,255,255,.55); }

/* ════════════════════════════════════════
   PAGES
════════════════════════════════════════ */
.page {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px 80px;
  display: none;
}
.page.active { display: block; }

/* ════════════════════════════════════════
   TASK SECTIONS
════════════════════════════════════════ */
.section-header {
  background: var(--color-primary);
  margin: 6px -10px 0;
  padding: 5px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: #fff;
}

.section-count {
  font-size: 10px;
  font-weight: 700;
  background: rgba(255,255,255,.25);
  color: #fff;
  padding: 1px 7px;
  border-radius: 10px;
}

/* ════════════════════════════════════════
   TASK CARD
════════════════════════════════════════ */
.task-card {
  background: var(--color-surface);
  border-radius: 3px;
  padding: 10px 12px 10px 14px;
  margin-bottom: 3px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  border-left: 4px solid var(--task-color, var(--task-color-default));
  transition: background .12s;
}
.task-card.overdue  { background: var(--color-danger-light); }
.task-card.done     { opacity: .52; }
.task-card.done .task-title { text-decoration: line-through; color: var(--color-text-muted); }
.task-card:active   { background: var(--color-primary-light); }

.task-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 3px;
  border: 2.5px solid var(--task-color, var(--task-color-default));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all .15s;
  margin-top: 1px;
}
.task-card.done .task-checkbox {
  background: var(--task-color, var(--task-color-default));
}
.task-checkbox svg { opacity: 0; transition: opacity .15s; }
.task-card.done .task-checkbox svg { opacity: 1; }

.task-body  { flex: 1; min-width: 0; }
.task-title { font-size: 16px; font-weight: 400; color: var(--color-text); line-height: 1.35; margin-bottom: 4px; }
.task-card.overdue .task-title { color: var(--color-danger); font-weight: 500; }

.task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.task-date       { font-size: 13px; color: var(--color-text-muted); }
.task-date.overdue { color: var(--color-danger); font-weight: 600; }
.task-repeat     { font-size: 12px; color: var(--color-text-dim); }

/* ════════════════════════════════════════
   EMPTY STATE
════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 70px 20px;
  gap: 12px;
  text-align: center;
}
.empty-icon { font-size: 52px; opacity: .28; }
.empty-text { font-size: 14px; color: var(--color-text-muted); font-weight: 500; }

/* ════════════════════════════════════════
   FAB BUTTONS
════════════════════════════════════════ */

/* Mic — bottom right, bigger, red ring */
.fab-mic {
  position: fixed;
  bottom: 22px;
  right: 16px;
  z-index: 50;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--color-primary);
  color: #fff;
  border: 4px solid #e53935;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(229,57,53,.45), 0 2px 12px rgba(26,157,170,.3);
  gap: 2px;
  transition: transform .2s;
}
.fab-mic:active { transform: scale(.9); }
.fab-mic-icon   { font-size: 34px; line-height: 1; }
.fab-mic-label  { font-size: 10px; font-weight: 700; letter-spacing: .5px; opacity: .9; }
.fab-mic.recording {
  animation: mic-pulse 1s infinite;
  border-color: #ff5252;
}
@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(229,57,53,.5); }
  50%       { box-shadow: 0 6px 32px rgba(229,57,53,.9); transform: scale(1.08); }
}

/* Add — bottom left */
.fab-add {
  position: fixed;
  bottom: 30px;
  left: 16px;
  z-index: 50;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: var(--color-primary);
  color: #fff;
  border: none;
  font-size: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,157,170,.5);
  transition: transform .2s;
}
.fab-add:active { transform: scale(.92); }

/* ════════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--color-primary);
  display: flex;
  padding: 5px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 40;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 0;
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(255,255,255,.55);
  transition: color .15s;
}
.nav-btn.active { color: #fff; }
.nav-btn svg    { width: 21px; height: 21px; }
.nav-btn span   { font-size: 9px; font-weight: 600; letter-spacing: .2px; }

/* ════════════════════════════════════════
   VOICE INDICATOR
════════════════════════════════════════ */
.voice-indicator {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--color-primary);
  padding: 11px 16px;
  display: none;
  align-items: center;
  gap: 10px;
  z-index: 90;
}
.voice-indicator.active { display: flex; }

.voice-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #fff;
  animation: blink .7s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .15; } }

.voice-text { font-size: 14px; color: #fff; font-weight: 500; }

/* ════════════════════════════════════════
   NOTIFICATION POPUP
════════════════════════════════════════ */
.notif-popup {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%) translateY(-220px);
  background: var(--color-surface);
  border-radius: 0 0 14px 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
  z-index: 200;
  width: 100%;
  max-width: 480px;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
}
.notif-popup.active { transform: translateX(-50%) translateY(0); }
.notif-popup.shake  { animation: notif-shake .4s ease; }
@keyframes notif-shake {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  25%       { transform: translateX(calc(-50% - 4px)) translateY(0); }
  75%       { transform: translateX(calc(-50% + 4px)) translateY(0); }
}

.notif-header {
  background: var(--color-primary);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.notif-app-name { font-size: 13px; font-weight: 700; color: #fff; }
.notif-time     { font-size: 12px; color: rgba(255,255,255,.75); }

.notif-body  { padding: 14px 14px 6px; text-align: center; }
.notif-title { font-size: 18px; font-weight: 400; color: var(--color-text); }

.notif-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border-top: 1px solid var(--color-border);
}
.notif-action-btn {
  padding: 12px 4px;
  background: none;
  border: none;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  color: var(--color-text-muted);
  letter-spacing: .5px;
  border-right: 1px solid var(--color-border);
  font-family: 'Roboto', sans-serif;
}
.notif-action-btn:last-child { border-right: none; color: var(--color-primary); }
.notif-action-btn:active     { background: var(--color-primary-light); }

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

.modal {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: var(--color-surface);
  border-radius: 0;
  transform: translateY(100%);
  transition: transform .3s ease;
  max-height: 93vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.overlay.active .modal { transform: translateY(0); }

.modal-header {
  background: var(--color-primary);
  padding: 13px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal-title {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1.1px;
  text-transform: uppercase;
}
.modal-close {
  background: none;
  border: none;
  color: #fff;
  font-size: 21px;
  cursor: pointer;
  line-height: 1;
}

.modal-body  { padding: 14px 16px; flex: 1; }

/* Done toggle row */
.modal-done-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0 12px;
  border-bottom: 1px solid var(--color-border);
  margin-bottom: 12px;
  cursor: pointer;
}
.modal-done-box {
  width: 22px;
  height: 22px;
  border-radius: 3px;
  border: 2px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  flex-shrink: 0;
}
.modal-done-box.checked { background: var(--color-primary); border-color: var(--color-primary); }
.modal-done-box svg     { opacity: 0; transition: opacity .15s; }
.modal-done-box.checked svg { opacity: 1; }
.modal-done-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--color-text-muted);
}

/* Form fields */
.form-field { margin-bottom: 12px; }
.form-field input,
.form-field select,
.form-field textarea {
  width: 100%;
  padding: 8px 0;
  border: none;
  border-bottom: 1.5px solid var(--color-border);
  background: transparent;
  color: var(--color-text);
  font-size: 15px;
  font-family: 'Roboto', sans-serif;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.form-field input:focus,
.form-field select:focus { border-color: var(--color-primary); }
.form-field input[type=text] { font-size: 16px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Quick time buttons */
.quick-time-btns { display: flex; gap: 8px; margin: 6px 0 2px; flex-wrap: wrap; }
.quick-time-btn {
  background: none;
  border: none;
  color: var(--color-primary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  font-family: 'Roboto', sans-serif;
  transition: background .15s;
  white-space: nowrap;
}
.quick-time-btn:active { background: var(--color-primary-light); }

.fire-info { font-size: 12px; color: var(--color-text-muted); min-height: 18px; margin-bottom: 6px; }

/* Repeat row */
.repeat-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-top: 1px solid var(--color-border);
}
.repeat-label { font-size: 14px; color: var(--color-text); }

.toggle {
  width: 44px;
  height: 26px;
  border-radius: 13px;
  background: var(--color-border);
  position: relative;
  cursor: pointer;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--color-primary); }
.toggle::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  top: 3px;
  left: 3px;
  transition: transform .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after { transform: translateX(18px); }

.repeat-details {
  display: none;
  padding: 6px 0 4px;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.repeat-details.visible { display: flex; }

.repeat-sub-label { font-size: 13px; color: var(--color-text-muted); }

.repeat-select {
  border: none;
  border-bottom: 1.5px solid var(--color-border);
  background: transparent;
  color: var(--color-text);
  font-size: 14px;
  font-family: 'Roboto', sans-serif;
  outline: none;
  padding: 2px 4px;
  -webkit-appearance: none;
}
.repeat-select.number { width: 52px; text-align: center; }

/* Color picker */
.color-picker { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.color-option {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform .15s, border-color .15s;
}
.color-option.selected { border-color: var(--color-text); transform: scale(1.15); }

/* Voice & melody row */
.voice-melody-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-top: 1px solid var(--color-border);
  margin-top: 6px;
}
.voice-row-left { display: flex; align-items: center; gap: 10px; }
.voice-row-label { font-size: 14px; color: var(--color-text); }
.melody-btn {
  background: none;
  border: none;
  color: var(--color-primary);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
  font-family: 'Roboto', sans-serif;
}

/* Modal footer buttons */
.modal-footer {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--color-border);
  flex-shrink: 0;
}
.modal-btn {
  padding: 14px;
  background: none;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .5px;
  font-family: 'Roboto', sans-serif;
  transition: background .15s;
}
.modal-btn:active    { background: var(--color-primary-light); }
.modal-btn-ok        { color: var(--color-primary); border-right: 1px solid var(--color-border); }
.modal-btn-cancel    { color: var(--color-text-muted); }
.modal-btn-delete    { grid-column: 1 / -1; color: var(--color-danger); border-top: 1px solid var(--color-border); }

/* ════════════════════════════════════════
   SETTINGS PAGE
════════════════════════════════════════ */
.settings-page { padding: 0 0 80px; }

.settings-section-title {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: var(--color-primary);
  padding: 14px 14px 6px;
  background: var(--color-bg);
}

.settings-card {
  background: var(--color-surface);
  border-top: 1px solid var(--color-border);
  border-bottom: 1px solid var(--color-border);
}

.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 14px;
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
}
.settings-item:last-child  { border-bottom: none; }
.settings-item:active      { background: var(--color-primary-light); }
.settings-item-name        { font-size: 14px; color: var(--color-text); }
.settings-item-value       { font-size: 13px; color: var(--color-text-muted); }

.settings-time-input {
  border: none;
  background: transparent;
  color: var(--color-primary);
  font-size: 14px;
  font-weight: 500;
  text-align: right;
  outline: none;
  width: 58px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
}

/* ════════════════════════════════════════
   ABOUT PAGE
════════════════════════════════════════ */
.about-page {
  padding: 30px 20px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  text-align: center;
}

.about-logo {
  width: 84px;
  height: 84px;
  border-radius: 22px;
  background: var(--color-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  box-shadow: 0 6px 20px rgba(26,157,170,.4);
}
.about-logo-mic { font-size: 30px; }
.about-logo-ok  { font-size: 9px; font-weight: 700; color: #fff; letter-spacing: .5px; }

.about-name    { font-size: 24px; font-weight: 700; color: var(--color-primary); }
.about-version { font-size: 13px; color: var(--color-text-muted); }
.about-desc    { font-size: 14px; color: var(--color-text-muted); line-height: 1.5; max-width: 300px; }

.about-btns {
  display: flex;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.about-btn {
  padding: 10px 22px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  transition: opacity .15s;
}
.about-btn:active          { opacity: .75; }
.about-btn-outline         { border: 1.5px solid var(--color-primary); background: transparent; color: var(--color-primary); }
.about-btn-filled          { border: none; background: var(--color-primary); color: #fff; }

.about-links {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  max-width: 300px;
}
.about-link {
  padding: 12px 16px;
  border-radius: 10px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  font-size: 13px;
  color: var(--color-primary);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.about-link:active { background: var(--color-primary-light); }

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-primary);
  color: #fff;
  padding: 11px 16px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
  z-index: 300;
  display: none;
  align-items: center;
  gap: 10px;
  max-width: 340px;
  width: calc(100% - 32px);
  transition: opacity .3s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.visible { display: flex; }

.toast-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }

.toast-edit-btn {
  background: rgba(255,255,255,.25);
  border: none;
  color: #fff;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
}

/* ════════════════════════════════════════
   BULK SELECT MODE
════════════════════════════════════════ */
.bulk-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%;
  max-width: 480px;
  background: var(--color-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px max(16px, env(safe-area-inset-bottom));
  z-index: 60;
  transition: transform .3s cubic-bezier(.34,1.2,.64,1);
  box-shadow: 0 -4px 20px rgba(0,0,0,.15);
}
.bulk-bar.visible {
  transform: translateX(-50%) translateY(0);
}
.bulk-bar-info {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
}
.bulk-bar-actions { display: flex; gap: 10px; }
.bulk-btn {
  padding: 8px 18px;
  border-radius: 20px;
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  transition: opacity .15s;
}
.bulk-btn:active { opacity: .75; }
.bulk-btn-cancel  { background: rgba(255,255,255,.25); color: #fff; }
.bulk-btn-delete  { background: #e53935; color: #fff; }

/* Select checkbox on card */
.task-card.selectable { cursor: default; }
.task-card.selectable:active { background: var(--color-surface); }
.task-select-box {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2.5px solid var(--color-border);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  cursor: pointer;
  font-size: 12px;
  color: #fff;
}
.task-card.selected .task-select-box {
  background: var(--color-danger);
  border-color: var(--color-danger);
}

/* Select-mode toggle button in header */
.select-mode-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,.9);
  cursor: pointer;
  padding: 5px 8px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .3px;
  border-radius: 6px;
  transition: background .15s;
  font-family: 'Roboto', sans-serif;
}
.select-mode-btn:active { background: rgba(255,255,255,.15); }
.select-mode-btn.active {
  background: rgba(255,255,255,.2);
  color: #fff;
}

let currentLang = localStorage.getItem('mimory_lang') || 'ru';

function i18n(key) {
  return TRANSLATIONS[currentLang]?.[key] ?? TRANSLATIONS.ru[key] ?? key;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = i18n(el.dataset.i18n);
  });
  // Update placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = i18n(el.dataset.i18nPh);
  });
  // Update select mode button if visible
  const selBtn = document.getElementById('selectModeBtn');
  if (selBtn) selBtn.textContent = selectMode ? i18n('sel_done') : i18n('sel_select');
  // Update bulk bar
  updateBulkBar();
  document.getElementById('langBtn').textContent = currentLang === 'ru' ? 'RO' : 'RU';
  buildColorFilters();
  updateFireInfo();
}

function toggleLang() {
  currentLang = currentLang === 'ru' ? 'ro' : 'ru';
  localStorage.setItem('mimory_lang', currentLang);
  applyTranslations();
  render();
  if (currentPage === 2) renderSettings();
  if (currentPage === 3) renderAbout();
}

const TASK_COLORS = [
  { id: 'c0', hex: '#ccc'     },
  { id: 'c1', hex: '#e53935'  },
  { id: 'c2', hex: '#d81b60'  },
  { id: 'c3', hex: '#43a047'  },
  { id: 'c4', hex: '#f4511e'  },
  { id: 'c5', hex: '#3949ab'  },
  { id: 'c6', hex: '#f9a825'  },
  { id: 'c7', hex: '#546e7a'  },
];

function getColorHex(colorId) {
  return TASK_COLORS.find(c => c.id === colorId)?.hex ?? '#ccc';
}

  popup: true, voice: true, vibro: true, silent: false, annoy: false,
  gtasks: false, gcal: false,
  mor: '07:30', lun: '13:00', eve: '19:00', nit: '00:30',

let activeColorFilter = '';

let annoyTimer        = null;

function loadData() {
  try { tasks = JSON.parse(localStorage.getItem('mimory_tasks') || '[]'); } catch { tasks = []; }

// ════════════════════════════════════════
// TIME HELPERS
// ════════════════════════════════════════
const now         = () => new Date();
const startOfDay  = () => { const d = new Date(); d.setHours(0, 0, 0, 0); return d; };
const endOfWeek   = () => { const d = startOfDay(); d.setDate(d.getDate() + (7 - d.getDay())); return d; };
const padTwo      = n => String(n).padStart(2, '0');

const MONTHS_RU = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const MONTHS_RO = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec'];

function formatDateTime(isoString) {
  if (!isoString) return i18n('no_dt');
  const date   = new Date(isoString);
  const months = currentLang === 'ru' ? MONTHS_RU : MONTHS_RO;
  return `${date.getDate()} ${months[date.getMonth()]} ${i18n('at')} ${padTwo(date.getHours())}:${padTwo(date.getMinutes())}`;
}

function formatCountdown(isoString) {
  if (!isoString) return '';
  const diff = new Date(isoString) - now();
  if (diff <= 0) return '';
  const totalMinutes = Math.round(diff / 60000);
  if (totalMinutes < 60) return `${i18n('fi_in')} ${totalMinutes} ${i18n('min_short')}`;
  const hours = Math.floor(totalMinutes / 60);
  if (hours < 24) return `${i18n('fi_in')} ${hours}${i18n('h_short')} ${totalMinutes % 60}${i18n('min_short')}`;
  return `${i18n('fi_in')} ${Math.floor(hours / 24)}${i18n('d_short')}`;
}

function formatRepeat(task) {
  if (!task.rep || task.rep === 'none') return i18n('no_rep');
  const presets = { wd: i18n('rep_wd'), wk: i18n('rep_wk'), mo: i18n('rep_mo'), yr: i18n('rep_yr') };
  if (presets[task.rep]) return `↻ ${presets[task.rep]}`;
  const unitLabels = { m:i18n('unit_m'), h:i18n('unit_h'), d:i18n('unit_d'), w:i18n('unit_w'), mo:i18n('unit_mo'), y:i18n('unit_y') };
  return `↻ ${i18n('every')} ${task.rn || 1} ${unitLabels[task.ru || 'd'] || i18n('unit_d')}`;
}

function isOverdue(task) {
  return !task.done && task.dt && new Date(task.dt) < new Date(now() - 120000);
}
function isToday(task) {
  if (!task.dt) return false;
  const d = new Date(task.dt), dayStart = startOfDay(), dayEnd = new Date(dayStart);
  dayEnd.setDate(dayEnd.getDate() + 1);
  return d >= dayStart && d < dayEnd;
}
function isThisWeek(task) {
  if (!task.dt) return false;
  const d = new Date(task.dt);
  return d >= startOfDay() && d < endOfWeek() && !isToday(task);
}

// ════════════════════════════════════════
// SMART VOICE PARSER
// ════════════════════════════════════════
function parseVoiceText(rawText) {
  let name = rawText.replace(/^(напомни|напоминание|напомнить|remind|reaminteste-mi)\s*/i, '').trim();
  let date = null;
  const base = new Date();

  const m = {
    hoursAndMins: rawText.match(/через\s+(\d+)\s*(?:часов?|ч\.?)\s+(\d+)\s*(?:минут?|мин)/i),
    mins:         rawText.match(/через\s+(\d+)\s*(?:минут?|мин)/i),
    hours:        rawText.match(/через\s+(\d+)\s*(?:часов?|ч\.?)/i),
    days:         rawText.match(/через\s+(\d+)\s*(?:дней?|дня?|д\.)/i),
    tomorrow:     rawText.match(/завтра/i),
    dayAfter:     rawText.match(/послезавтра/i),
    weekday:      rawText.match(/(понедельник|вторник|среду?|четверг|пятниц[уа]|субботу?|воскресенье)/i),
    atTime:       rawText.match(/в\s+(\d{1,2})[:\.](\d{2})/i),
    morning:      rawText.match(/утром?/i),
    afternoon:    rawText.match(/обед/i),
    evening:      rawText.match(/вечером?/i),
    night:        rawText.match(/ночью?/i),
  };

  if (m.hoursAndMins) {
    date = new Date(base);
    date.setHours(date.getHours() + parseInt(m.hoursAndMins[1]));
    date.setMinutes(date.getMinutes() + parseInt(m.hoursAndMins[2]));
  } else if (m.mins) {
    date = new Date(base);
    date.setMinutes(date.getMinutes() + parseInt(m.mins[1]));
  } else if (m.hours) {
    date = new Date(base);
    date.setHours(date.getHours() + parseInt(m.hours[1]));
  } else if (m.days) {
    date = new Date(base);
    date.setDate(date.getDate() + parseInt(m.days[1]));
  } else if (m.dayAfter) {
    date = new Date(base);
    date.setDate(date.getDate() + 2);
  } else if (m.tomorrow) {
    date = new Date(base);
    date.setDate(date.getDate() + 1);
  } else if (m.weekday) {
    const weekdayMap = {
      'понедельник':1, 'вторник':2, 'среда':3, 'среду':3,
      'четверг':4, 'пятница':5, 'пятницу':5,
      'суббота':6, 'субботу':6, 'воскресенье':0,
    };
    const targetDay = weekdayMap[m.weekday[1].toLowerCase()] ?? 1;
    date = new Date(base);
    let diff = targetDay - date.getDay();
    if (diff <= 0) diff += 7;
    date.setDate(date.getDate() + diff);
  }

  if (date) {
    const setHourFromConfig = (timeStr) => {
      const [h, min] = timeStr.split(':');
      date.setHours(parseInt(h), parseInt(min), 0);
    };
    if (m.morning)   setHourFromConfig(config.mor || '07:30');
    else if (m.afternoon) setHourFromConfig(config.lun || '13:00');
    else if (m.evening)   setHourFromConfig(config.eve || '19:00');
    else if (m.night)     setHourFromConfig(config.nit || '00:30');
  }

  if (m.atTime) {
    if (!date) date = new Date(base);
    date.setHours(parseInt(m.atTime[1]), parseInt(m.atTime[2]), 0);
    if (date < base && !m.tomorrow && !m.dayAfter && !m.weekday) {
      date.setDate(date.getDate() + 1);
    }
  }

  // Strip time-related words from the task name
  const timePatterns = [
    /через\s+\d+\s*(?:часов?|ч\.?)\s+\d+\s*(?:минут?|мин)/i,
    /через\s+\d+\s*(?:минут?|мин)/i,
    /через\s+\d+\s*(?:часов?|ч\.?)/i,
    /через\s+\d+\s*(?:дней?|дня?|д\.)/i,
    /послезавтра/i, /завтра/i,
    /в следующий\s+\w+/i,
    /(в\s+)?(понедельник|вторник|среду?|четверг|пятниц[уа]|субботу?|воскресенье)/i,
    /утром?/i, /обед/i, /вечером?/i, /ночью?/i,
    /в\s+\d{1,2}[:.]\d{2}/i,
  ];
  timePatterns.forEach(re => { name = name.replace(re, '').trim(); });
  name = name.replace(/\s{2,}/g, ' ').replace(/^[,\s]+|[,\s]+$/g, '').trim() || rawText;

  return { name, date };
}

// RENDER
// ════════════════════════════════════════
function render() {
  if (currentPage === 0) renderActiveTasks();
  else if (currentPage === 1) renderDoneTasks();
}

function applyFilters(taskList) {
  let result = taskList;
  if (activeColorFilter) {
    result = result.filter(task => task.col === activeColorFilter);
  }
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (query) {
    result = result.filter(task => task.name.toLowerCase().includes(query));
  }
  return result;
}

function renderActiveTasks() {
  const activeTasks = applyFilters(tasks.filter(task => !task.done));
  const overdue     = activeTasks.filter(isOverdue);
  const today       = activeTasks.filter(task => !isOverdue(task) && isToday(task));
  const thisWeek    = activeTasks.filter(task => !isOverdue(task) && isThisWeek(task));
  const noDate      = activeTasks.filter(task => !task.dt);

  let html = '';
  if (overdue.length)  html += renderSection('s_ov', overdue);
  if (today.length)    html += renderSection('s_td', today);
  if (thisWeek.length) html += renderSection('s_wk', thisWeek);
  if (noDate.length)   html += renderSection('s_nd', noDate);

  if (!activeTasks.length) {
    html = `<div class="empty-state">
      <div class="empty-icon">✅</div>
      <div class="empty-text">${i18n('e_act')}</div>
    </div>`;
  }

  document.getElementById('page0').innerHTML = html;
}

function renderDoneTasks() {
  const doneTasks = applyFilters(tasks.filter(task => task.done));
  document.getElementById('page1').innerHTML = doneTasks.length
    ? renderSection('s_dn', doneTasks)
    : `<div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">${i18n('e_dn')}</div>
      </div>`;
}

function renderSection(labelKey, taskList) {
  return `
    <div class="section-header">
      <span class="section-label">${i18n(labelKey)}</span>
      <span class="section-count">${taskList.length}</span>
    </div>
    ${taskList.map(renderTaskCard).join('')}
  `;
}

function renderTaskCard(task) {
  const colorHex = getColorHex(task.col);
  const isOv     = isOverdue(task);
  const isSel    = selectedIds.has(task.id);

  if (selectMode) {
    return `
      <div class="task-card ${task.done?'done':''} ${isOv?'overdue':''} selectable ${isSel?'selected':''}"
           data-id="${task.id}"
           style="--task-color:${colorHex}"
           onclick="toggleSelectTask('${task.id}', event)">
        <div class="task-select-box">${isSel?'✓':''}</div>
        <div class="task-body">
          <div class="task-title">${escapeHtml(task.name)}</div>
          <div class="task-meta">
            <span class="task-date ${isOv?'overdue':''}">${formatDateTime(task.dt)}</span>
            <span class="task-repeat">${formatRepeat(task)}</span>
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="task-card ${task.done?'done':''} ${isOv?'overdue':''}"
         data-id="${task.id}"
         style="--task-color:${colorHex}"
         onclick="openModal('${task.id}')">
      <div class="task-checkbox" onclick="event.stopPropagation(); toggleTaskDone('${task.id}')">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <polyline points="1 4.5 4 7.5 10 1"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-title">${escapeHtml(task.name)}</div>
        <div class="task-meta">
          <span class="task-date ${isOv?'overdue':''}">${formatDateTime(task.dt)}</span>
          <span class="task-repeat">${formatRepeat(task)}</span>
        </div>
      </div>
    </div>`;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function openModal(taskId) {
  editingTaskId = taskId || null;
  const task = taskId ? tasks.find(t => t.id === taskId) : null;

  document.getElementById('modalTitle').textContent = i18n(task ? 'edit_task' : 'add_task');
  document.getElementById('fieldName').value = task ? task.name : '';

  if (task?.dt) {
    const date = new Date(task.dt);
    document.getElementById('fieldDate').value = date.toISOString().split('T')[0];
    document.getElementById('fieldTime').value = `${padTwo(date.getHours())}:${padTwo(date.getMinutes())}`;
  } else {
    const defaultDate = new Date();
    defaultDate.setHours(defaultDate.getHours() + 1, 0, 0, 0);
    document.getElementById('fieldDate').value = defaultDate.toISOString().split('T')[0];
    document.getElementById('fieldTime').value = `${padTwo(defaultDate.getHours())}:${padTwo(defaultDate.getMinutes())}`;
  }

  buildColorPicker(task?.col || 'c0');

  const hasRepeat = task?.rep && task.rep !== 'none';
  setToggle('repeatToggle', hasRepeat);
  document.getElementById('repeatDetails').classList.toggle('visible', !!hasRepeat);

  if (task) {
    document.getElementById('fieldRepeatNum').value  = task.rn || 1;
    document.getElementById('fieldRepeatUnit').value = task.ru || 'd';
  }

  setToggle('voiceToggle', task ? task.voice : config.voice);

  modalDoneState = task?.done || false;
  document.getElementById('modalDoneBox').classList.toggle('checked', modalDoneState);
  document.getElementById('modalDeleteBtn').style.display = task ? 'block' : 'none';

  updateFireInfo();
  document.getElementById('overlay').classList.add('active');
  // Auto-focus removed — prevents keyboard popping up on task open
}

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}

function handleOverlayClick(event) {
  if (event.target === document.getElementById('overlay')) closeModal();
}

function toggleModalDone() {
  modalDoneState = !modalDoneState;
  document.getElementById('modalDoneBox').classList.toggle('checked', modalDoneState);
}

function buildColorPicker(selectedColorId) {
  document.getElementById('colorPicker').innerHTML = TASK_COLORS.map(color =>
    `<div class="color-option ${selectedColorId === color.id ? 'selected' : ''}"
          style="background:${color.hex}"
          data-color-id="${color.id}"
          onclick="selectColor('${color.id}')"></div>`
  ).join('');
}

function selectColor(colorId) {
  document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.color-option[data-color-id="${colorId}"]`)?.classList.add('selected');
}

// No more fragile style.background string comparison!

}

function toggleRepeat() {
  const toggle  = document.getElementById('repeatToggle');
  const details = document.getElementById('repeatDetails');
  toggle.classList.toggle('on');
  details.classList.toggle('visible', toggle.classList.contains('on'));
}

function setToggle(id, value) {
  document.getElementById(id)?.classList.toggle('on', !!value);
}

function getToggle(id) {
  return document.getElementById(id)?.classList.contains('on') ?? false;
}

function applyRepeatPreset() {
  const preset = document.getElementById('fieldRepeatPreset').value;
  const presetMap = { wd:{u:'d',n:1}, wk:{u:'w',n:1}, mo:{u:'mo',n:1}, yr:{u:'y',n:1} };
  if (presetMap[preset]) {
    document.getElementById('fieldRepeatUnit').value = presetMap[preset].u;
    document.getElementById('fieldRepeatNum').value  = presetMap[preset].n;
  }

function shiftTime(amount, unit) {
  const date = getModalDateTime() || new Date();
  if (unit === 'm') date.setMinutes(date.getMinutes() + amount);
  else if (unit === 'h') date.setHours(date.getHours() + amount);
  else if (unit === 'd') date.setDate(date.getDate() + amount);
  document.getElementById('fieldDate').value = date.toISOString().split('T')[0];
  document.getElementById('fieldTime').value = `${padTwo(date.getHours())}:${padTwo(date.getMinutes())}`;
  updateFireInfo();
}

function getModalDateTime() {
  const dateStr = document.getElementById('fieldDate').value;
  const timeStr = document.getElementById('fieldTime').value;
  return dateStr ? new Date(dateStr + 'T' + (timeStr || '00:00')) : null;
}

function updateFireInfo() {
  const date = getModalDateTime();
  document.getElementById('fireInfo').textContent = date ? formatCountdown(date.toISOString()) : '';

// TASK CRUD
// ════════════════════════════════════════
function saveTask() {
  const name = document.getElementById('fieldName').value.trim();
  if (!name) { document.getElementById('fieldName').focus(); return; }

  const dateStr = document.getElementById('fieldDate').value;
  const timeStr = document.getElementById('fieldTime').value;
  const dt      = dateStr ? new Date(dateStr + 'T' + (timeStr || '00:00')).toISOString() : null;

  const colorId   = getSelectedColorId();
  const hasRepeat = getToggle('repeatToggle');
  const preset    = document.getElementById('fieldRepeatPreset').value;
  const rep       = hasRepeat ? (preset || 'custom') : 'none';
  const rn        = parseInt(document.getElementById('fieldRepeatNum').value) || 1;
  const ru        = document.getElementById('fieldRepeatUnit').value;
  const voice     = getToggle('voiceToggle');

  if (editingTaskId) {
    const index = tasks.findIndex(t => t.id === editingTaskId);
    if (index >= 0) {
      Object.assign(tasks[index], { name, dt, col: colorId, rep, rn, ru, voice, done: modalDoneState });
    }
  } else {
    tasks.push({
      id: generateId(), name, dt,
      col: colorId, rep, rn, ru, voice,
      done: false,
      createdAt: new Date().toISOString(),
    });
  }

  saveTasks();
  closeModal();
  render();
}

function deleteTask() {
  if (!editingTaskId) return;
  tasks = tasks.filter(t => t.id !== editingTaskId);
  saveTasks();
  closeModal();
  render();
}

function toggleTaskDone(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  task.done = !task.done;

  // Auto-create next occurrence for repeating tasks
  if (task.done && task.rep && task.rep !== 'none' && task.dt) {
    const nextDate = computeNextOccurrence(task);
    if (nextDate) {
      tasks.push({
        ...task,
        id: generateId(),
        done: false,
        dt: nextDate.toISOString(),
        createdAt: new Date().toISOString(),
      });
    }
  }

  saveTasks();
  render();
}

function computeNextOccurrence(task) {
  const date   = new Date(task.dt);
  const unit   = task.ru || 'd';
  const amount = task.rn || 1;

  if (task.rep === 'wd') {
    do { date.setDate(date.getDate() + 1); }
    while (date.getDay() === 0 || date.getDay() === 6);
  } else if (task.rep === 'wk') {
    date.setDate(date.getDate() + 7);
  } else if (task.rep === 'mo') {
    date.setMonth(date.getMonth() + 1);
  } else if (task.rep === 'yr') {
    date.setFullYear(date.getFullYear() + 1);
  } else {
    const unitFns = {
      m:  () => date.setMinutes(date.getMinutes() + amount),
      h:  () => date.setHours(date.getHours() + amount),
      d:  () => date.setDate(date.getDate() + amount),
      w:  () => date.setDate(date.getDate() + amount * 7),
      mo: () => date.setMonth(date.getMonth() + amount),
      y:  () => date.setFullYear(date.getFullYear() + amount),
    };
    unitFns[unit]?.();
  }

  return date > now() ? date : null;
}

// ════════════════════════════════════════
// WEB AUDIO ALARM
// ════════════════════════════════════════
let audioContext = null;
let alarmOscillators = [];

function getAudioContext() {
  if (!audioContext || audioContext.state === 'closed') {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioContext.state === 'suspended') audioContext.resume();
  return audioContext;
}

function playAlarm() {
  try {
    const ctx = getAudioContext();
    stopAlarm();
    const volume  = config.volume / 100;
    const melody  = [
      { freq: 880,  start: 0,    duration: .12 },
      { freq: 880,  start: .15,  duration: .12 },
      { freq: 880,  start: .30,  duration: .12 },
      { freq: 1047, start: .50,  duration: .15 },
      { freq: 880,  start: .68,  duration: .12 },
      { freq: 1047, start: .85,  duration: .15 },
      { freq: 1175, start: 1.05, duration: .25 },
    ];

    melody.forEach(({ freq, start, duration }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const startTime = ctx.currentTime + start;
      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + 0.02);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.05);
      alarmOscillators.push(osc);
    });

    if (config.annoy) {
      alarmRepeatTimer = setTimeout(() => playAlarm(), 2500);
    }
  } catch (err) {
    console.warn('Audio error:', err);
  }
}

function stopAlarm() {
  clearTimeout(alarmRepeatTimer);
  alarmRepeatTimer = null;
  alarmOscillators.forEach(osc => { try { osc.stop(); } catch {} });
  alarmOscillators = [];
}

// Unlock AudioContext on first user interaction
document.addEventListener('touchstart', () => { try { getAudioContext(); } catch {} }, { once: true, passive: true });
document.addEventListener('click',      () => { try { getAudioContext(); } catch {} }, { once: true });

  if (document.hidden) return;
  tasks
    .filter(task => !task.done && task.dt)
    .forEach(task => {

      if (diff > -60000 && diff < 30000 && notifTaskId !== task.id) {
        notifTaskId = task.id;
        showNotifPopup(task);
      }
    });
}

function showNotifPopup(task) {
  document.getElementById('notifTitle').textContent = task.name;
  document.getElementById('notifTime').textContent  = task.dt
    ? `${padTwo(new Date(task.dt).getHours())}:${padTwo(new Date(task.dt).getMinutes())}`
    : '';

  const popup = document.getElementById('notifPopup');
  popup.classList.add('active');

  playAlarm();
  if (config.vibro && navigator.vibrate) navigator.vibrate([400, 150, 400, 150, 400]);

  if (Notification.permission === 'granted') {
    new Notification('Mimory — ' + task.name, {
      body: '⏰ ' + formatDateTime(task.dt),
      icon: 'icon-192.png',
      tag: task.id,
      requireInteraction: config.annoy,
    });
  }

  if (config.annoy) {
    clearInterval(annoyTimer);
    let repeatCount = 0;
    annoyTimer = setInterval(() => {
      if (++repeatCount > 10 || !popup.classList.contains('active')) {
        clearInterval(annoyTimer);
        stopAlarm();
        return;
      }
      popup.classList.add('shake');
      setTimeout(() => popup.classList.remove('shake'), 400);
      if (config.vibro && navigator.vibrate) navigator.vibrate([300, 100, 300]);
      playAlarm();
    }, 60000);
  } else {
    setTimeout(() => {
      popup.classList.remove('active');
      notifTaskId = null;
      stopAlarm();
    }, 15000);
  }
}

function completeNotif() {
  if (notifTaskId) toggleTaskDone(notifTaskId);
  hideNotifPopup();
}

function snoozeTask() {
  if (!notifTaskId) { hideNotifPopup(); return; }
  const task = tasks.find(t => t.id === notifTaskId);
  if (task) {
    const snoozedDate = new Date();
    snoozedDate.setMinutes(snoozedDate.getMinutes() + 10);
    task.dt = snoozedDate.toISOString();
    saveTasks();
    render();
  }
  hideNotifPopup();
}

function transferTask() {
  if (!notifTaskId) { hideNotifPopup(); return; }
  const task = tasks.find(t => t.id === notifTaskId);
  if (task) {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    task.dt = tomorrow.toISOString();
    saveTasks();
    render();
  }
  hideNotifPopup();
}

function hideNotifPopup() {
  clearInterval(annoyTimer);
  stopAlarm();
  document.getElementById('notifPopup').classList.remove('active');
  notifTaskId = null;
}

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
let toastTimer     = null;
let toastTaskId    = null;

function showToast(message, taskId) {
  toastTaskId = taskId;
  const toast        = document.getElementById('toast');
  const toastText    = document.getElementById('toastText');
  const toastEditBtn = document.getElementById('toastEditBtn');

  toastText.textContent    = message;
  toastEditBtn.textContent = i18n('edit');
  toast.style.opacity      = '1';
  toast.classList.add('visible');

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.classList.remove('visible'), 300);
  }, 5000);
}

function editLastTask() {
  clearTimeout(toastTimer);
  const toast = document.getElementById('toast');
  toast.style.opacity = '0';
  toast.classList.remove('visible');
  if (toastTaskId) openModal(toastTaskId);
}

// ════════════════════════════════════════
// VOICE INPUT
// ════════════════════════════════════════
let speechRecognizer = null;

function startVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert(i18n('v_no')); return; }

  if (speechRecognizer) { speechRecognizer.stop(); return; }

  speechRecognizer = new SpeechRecognition();
  speechRecognizer.lang = currentLang === 'ru' ? 'ru-RU' : 'ro-RO';
  speechRecognizer.continuous = false;
  speechRecognizer.interimResults = false;

  speechRecognizer.onstart = () => {
    document.getElementById('fabMic').classList.add('recording');
    document.getElementById('voiceIndicator').classList.add('active');
    document.getElementById('voiceText').textContent = i18n('v_go');
  };

  speechRecognizer.onresult = event => {
    const rawText = event.results[0][0].transcript;
    const parsed  = parseVoiceText(rawText);
    if (!parsed.name) return;

    const newId = generateId();
    tasks.push({
      id: newId,
      name: parsed.name,
      dt: parsed.date ? parsed.date.toISOString() : null,
      col: 'c0', rep: 'none', rn: 1, ru: 'd',
      voice: config.voice,
      done: false,
      createdAt: new Date().toISOString(),
    });
    saveTasks();
    render();

    const timeStr = parsed.date
      ? ` · ${padTwo(parsed.date.getHours())}:${padTwo(parsed.date.getMinutes())}`
      : '';
    showToast(`✅ ${parsed.name}${timeStr}`, newId);
  };

  speechRecognizer.onerror = () => { stopVoiceUI(); speechRecognizer = null; };
  speechRecognizer.onend   = () => { stopVoiceUI(); speechRecognizer = null; };
  speechRecognizer.start();
}

function stopVoiceUI() {
  document.getElementById('fabMic').classList.remove('recording');
  document.getElementById('voiceIndicator').classList.remove('active');
}

// ════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════
function exportData() {
  const blob = new Blob(
    [JSON.stringify({ v: '2.0', tasks, cfg: config }, null, 2)],
    { type: 'application/json' }
  );
  const link = document.createElement('a');
  link.href     = URL.createObjectURL(blob);
  link.download = `mimory_${new Date().toISOString().slice(0, 10)}.json`;
  link.click();
}

function importData() {
  const input    = document.createElement('input');
  input.type     = 'file';
  input.accept   = '.json';
  input.onchange = event => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.tasks) {
          tasks = data.tasks;
          if (data.cfg) Object.assign(config, data.cfg);
          saveTasks();
          saveConfig();
          render();
          alert(i18n('imp_ok'));
        }
      } catch {
        alert(i18n('file_error'));
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ════════════════════════════════════════
// SERVICE WORKER & PWA
// ════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data?.action === 'done'   && event.data.taskId) toggleTaskDone(event.data.taskId);
    if (event.data?.action === 'snooze' && event.data.taskId) {
      const task = tasks.find(t => t.id === event.data.taskId);
      if (task) {
        const snoozedDate = new Date();
        snoozedDate.setMinutes(snoozedDate.getMinutes() + 10);
        task.dt = snoozedDate.toISOString();
        saveTasks();
        render();
      }
    }
  });
}

document.getElementById('fieldName').addEventListener('keydown', event => {

});

document.getElementById('fieldDate').addEventListener('change', updateFireInfo);
document.getElementById('fieldTime').addEventListener('change', updateFireInfo);


// ════════════════════════════════════════
// BULK SELECT
// ════════════════════════════════════════
let selectMode = false;
let selectedIds = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  const btn = document.getElementById('selectModeBtn');
  const bar = document.getElementById('bulkBar');
  btn.classList.toggle('active', selectMode);
  btn.textContent = selectMode ? i18n('sel_done') : i18n('sel_select');
  bar.classList.toggle('visible', selectMode);
  updateBulkBar();
  render();
}

function toggleSelectTask(taskId, event) {
  event.stopPropagation();
  if (selectedIds.has(taskId)) selectedIds.delete(taskId);
  else selectedIds.add(taskId);
  updateBulkBar();
  // Update just this card's visual
  const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
  if (card) {
    card.classList.toggle('selected', selectedIds.has(taskId));
    const box = card.querySelector('.task-select-box');
    if (box) box.textContent = selectedIds.has(taskId) ? '✓' : '';
  }
}

function updateBulkBar() {
  const n = selectedIds.size;
  const infoEl    = document.getElementById('bulkInfo');
  const deleteBtn = document.getElementById('bulkDeleteBtn');
  const cancelBtn = document.getElementById('bulkCancelBtn');
  if (!infoEl) return; // bulk bar not in DOM yet

  infoEl.textContent =
    n === 0 ? i18n('sel_none') :
    n === 1 ? i18n('sel_one')  :
    n < 5   ? `${n} ${i18n('sel_few')}` : `${n} ${i18n('sel_many')}`;

  if (deleteBtn) deleteBtn.style.opacity = n > 0 ? '1' : '.45';
  if (cancelBtn) cancelBtn.textContent = i18n('cancel_select');
}

function bulkDelete() {
  if (selectedIds.size === 0) return;
  const n = selectedIds.size;
  tasks = tasks.filter(t => !selectedIds.has(t.id));
  saveTasks();
  toggleSelectMode();
  showToast(`🗑 ${i18n('deleted_toast')} ${n}`, null);
}
