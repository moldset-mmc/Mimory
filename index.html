<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mimory</title>
<meta name="theme-color" content="#1a9daa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Mimory — умный планировщик задач">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --T:#1a9daa;--T2:#158896;--TL:#e4f7f9;
  --R:#e53935;--RL:#fff0f0;
  --tx:#1c1c1c;--tx2:#777;--tx3:#bbb;
  --bg:#f0f0f0;--card:#fff;--brd:#e0e0e0;
  --c0:#ccc;--c1:#e53935;--c2:#d81b60;--c3:#43a047;
  --c4:#f4511e;--c5:#3949ab;--c6:#f9a825;--c7:#546e7a;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1e1e1e;--tx:#eee;--tx2:#999;
  --brd:#2e2e2e;--TL:#0d2f32;--RL:#2a1010;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);overflow:hidden;font-family:'Roboto',sans-serif}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* ── HEADER ── */
.hdr{background:var(--T);padding:10px 14px 0;z-index:20;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px}
.logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:.3px}
.hdr-acts{display:flex;gap:8px;align-items:center}
.ico-btn{background:none;border:none;color:rgba(255,255,255,.9);cursor:pointer;padding:5px;font-size:19px;line-height:1;border-radius:6px;transition:background .15s}
.ico-btn:active{background:rgba(255,255,255,.15)}
.lang-btn{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;border:1.5px solid rgba(255,255,255,.7);background:transparent;color:#fff;cursor:pointer;letter-spacing:.3px}
.cfilters{display:flex;gap:7px;padding:5px 0 8px;overflow-x:auto;scrollbar-width:none}
.cfilters::-webkit-scrollbar{display:none}
.cdot{width:24px;height:24px;border-radius:50%;border:3px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .15s,border-color .15s}
.cdot.on{border-color:#fff;transform:scale(1.2)}
.search-bar{background:var(--T2);padding:0 14px 8px;display:none}
.search-bar.open{display:block}
.s-inp{width:100%;padding:8px 14px;border-radius:20px;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:14px;outline:none}
.s-inp::placeholder{color:rgba(255,255,255,.55)}

/* ── PAGES ── */
.pg{flex:1;overflow-y:auto;padding:6px 10px 80px;display:none}
.pg.on{display:block}

/* ── SECTIONS ── */
.sec-hdr{background:var(--T);margin:6px -10px 0;padding:5px 14px;display:flex;align-items:center;gap:8px}
.sec-lbl{font-size:10.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:#fff}
.sec-cnt{font-size:10px;font-weight:700;background:rgba(255,255,255,.25);color:#fff;padding:1px 7px;border-radius:10px}

/* ── TASK CARD ── */
.tc{background:var(--card);border-radius:3px;padding:10px 12px 10px 14px;margin-bottom:3px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;position:relative;overflow:hidden;border-left:4px solid var(--cc,var(--c0));transition:background .12s}
.tc.ov{background:var(--RL)}
.tc.done{opacity:.52}
.tc.done .tt{text-decoration:line-through;color:var(--tx2)}
.tc:active{background:var(--TL)}
.chk{width:20px;height:20px;border-radius:3px;border:2.5px solid var(--cc,var(--c0));display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px}
.tc.done .chk{background:var(--cc,var(--c0))}
.chk svg{opacity:0;transition:opacity .15s}
.tc.done .chk svg{opacity:1}
.tb{flex:1;min-width:0}
.tt{font-size:14.5px;font-weight:400;color:var(--tx);line-height:1.3;margin-bottom:3px}
.tc.ov .tt{color:var(--R);font-weight:500}
.tm{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.td2{font-size:11.5px;color:var(--tx2)}
.td2.ov{color:var(--R);font-weight:600}
.trp{font-size:11px;color:var(--tx3)}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:12px;text-align:center}
.e-ico{font-size:52px;opacity:.28}
.e-txt{font-size:14px;color:var(--tx2);font-weight:500}

/* ── FAB ── */
.fabs{position:fixed;bottom:20px;right:15px;z-index:50;display:flex;flex-direction:column-reverse;gap:10px;align-items:flex-end}
.fab-mic{width:58px;height:58px;border-radius:50%;background:var(--T);color:#fff;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(26,157,170,.5);gap:1px;transition:transform .2s}
.fab-mic:active{transform:scale(.9)}
.fm-ico{font-size:22px;line-height:1}
.fm-lbl{font-size:8px;font-weight:700;letter-spacing:.5px;opacity:.85}
.fab-mic.rec{animation:pls 1s infinite}
@keyframes pls{0%,100%{box-shadow:0 4px 16px rgba(26,157,170,.5)}50%{box-shadow:0 4px 28px rgba(26,157,170,.9);transform:scale(1.06)}}
.fab-add{width:44px;height:44px;border-radius:50%;background:var(--T);color:#fff;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px rgba(26,157,170,.42)}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--T);display:flex;padding:5px 0 max(8px,env(safe-area-inset-bottom));z-index:40}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.55);transition:color .15s}
.nb.on{color:#fff}
.nb svg{width:21px;height:21px}
.nb span{font-size:9px;font-weight:600;letter-spacing:.2px}

/* ── VOICE ── */
.vind{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--T);padding:11px 16px;display:none;align-items:center;gap:10px;z-index:90}
.vind.on{display:flex}
.vdot{width:7px;height:7px;border-radius:50%;background:#fff;animation:bl .7s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.15}}
.vtxt{font-size:14px;color:#fff;font-weight:500}

/* ── NOTIF POPUP ── */
.npop{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-220px);background:var(--card);border-radius:0 0 14px 14px;box-shadow:0 4px 24px rgba(0,0,0,.2);z-index:200;width:100%;max-width:480px;transition:transform .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
.npop.on{transform:translateX(-50%) translateY(0)}
.np-hdr{background:var(--T);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.np-app{font-size:13px;font-weight:700;color:#fff}
.np-time{font-size:12px;color:rgba(255,255,255,.75)}
.np-body{padding:14px 14px 6px;text-align:center}
.np-title{font-size:18px;font-weight:400;color:var(--tx)}
.np-btns{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid var(--brd)}
.np-btn{padding:12px 4px;background:none;border:none;font-size:12px;font-weight:700;cursor:pointer;color:var(--tx2);letter-spacing:.5px;border-right:1px solid var(--brd);font-family:'Roboto',sans-serif}
.np-btn:last-child{border-right:none;color:var(--T)}
.np-btn:active{background:var(--TL)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.modal{width:100%;max-width:480px;margin:0 auto;background:var(--card);border-radius:0;transform:translateY(100%);transition:transform .3s ease;max-height:93vh;overflow-y:auto;display:flex;flex-direction:column}
.overlay.on .modal{transform:translateY(0)}
.mhdr{background:var(--T);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtitle{font-size:13px;font-weight:700;color:#fff;letter-spacing:1.1px;text-transform:uppercase}
.mclose{background:none;border:none;color:#fff;font-size:21px;cursor:pointer;line-height:1}
.mbody{padding:14px 16px;flex:1}

.done-row{display:flex;align-items:center;gap:10px;padding:7px 0 12px;border-bottom:1px solid var(--brd);margin-bottom:12px;cursor:pointer}
.done-box{width:22px;height:22px;border-radius:3px;border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.done-box.on{background:var(--T);border-color:var(--T)}
.done-box svg{opacity:0;transition:opacity .15s}
.done-box.on svg{opacity:1}
.done-lbl{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx2)}

.fi{margin-bottom:12px}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 0;border:none;border-bottom:1.5px solid var(--brd);background:transparent;color:var(--tx);font-size:15px;font-family:'Roboto',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi input:focus,.fi select:focus{border-color:var(--T)}
.fi input[type=text]{font-size:16px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.qbtns{display:flex;gap:8px;margin:6px 0 2px;flex-wrap:wrap}
.qbtn{background:none;border:none;color:var(--T);font-size:13px;font-weight:500;cursor:pointer;padding:4px 8px;border-radius:4px;font-family:'Roboto',sans-serif;transition:background .15s;white-space:nowrap}
.qbtn:active{background:var(--TL)}
.fire{font-size:12px;color:var(--tx2);min-height:18px;margin-bottom:6px}

.rep-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--brd)}
.rep-lbl{font-size:14px;color:var(--tx)}
.tog{width:44px;height:26px;border-radius:13px;background:var(--brd);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--T)}
.tog::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(18px)}
.rep-det{display:none;padding:6px 0 4px;align-items:center;gap:8px;flex-wrap:wrap}
.rep-det.on{display:flex}
.rep-lbl2{font-size:13px;color:var(--tx2)}
.rs{border:none;border-bottom:1.5px solid var(--brd);background:transparent;color:var(--tx);font-size:14px;font-family:'Roboto',sans-serif;outline:none;padding:2px 4px;-webkit-appearance:none}
.rs.n{width:52px;text-align:center}

.cpick{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.co{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.co.on{border-color:var(--tx);transform:scale(1.15)}

.vrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--brd);margin-top:6px}
.vrow-l{display:flex;align-items:center;gap:10px}
.vrow-lbl{font-size:14px;color:var(--tx)}
.mel-btn{background:none;border:none;color:var(--T);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:'Roboto',sans-serif}

.mbtns{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--brd);flex-shrink:0}
.mbtn{padding:14px;background:none;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:'Roboto',sans-serif;transition:background .15s}
.mbtn:active{background:var(--TL)}
.mb-ok{color:var(--T);border-right:1px solid var(--brd)}
.mb-ca{color:var(--tx2)}
.mb-del{grid-column:1/-1;color:var(--R);border-top:1px solid var(--brd)}

/* ── SETTINGS ── */
.spage{padding:0 0 80px}
.stitle{font-size:10.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--T);padding:14px 14px 6px;background:var(--bg)}
.scard{background:var(--card);border-top:1px solid var(--brd);border-bottom:1px solid var(--brd)}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--brd);cursor:pointer}
.sitem:last-child{border-bottom:none}
.sitem:active{background:var(--TL)}
.si-name{font-size:14px;color:var(--tx)}
.si-val{font-size:13px;color:var(--tx2)}
.stime{border:none;background:transparent;color:var(--T);font-size:14px;font-weight:500;text-align:right;outline:none;width:58px;cursor:pointer;font-family:'Roboto',sans-serif}

/* ── ABOUT ── */
.apage{padding:30px 20px 80px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center}
.a-logo{width:84px;height:84px;border-radius:22px;background:var(--T);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 6px 20px rgba(26,157,170,.4)}
.a-mic{font-size:30px}
.a-ok{font-size:9px;font-weight:700;color:#fff;letter-spacing:.5px}
.a-name{font-size:24px;font-weight:700;color:var(--T)}
.a-ver{font-size:13px;color:var(--tx2)}
.a-desc{font-size:14px;color:var(--tx2);line-height:1.5;max-width:300px}
.a-btns{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.a-btn{padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Roboto',sans-serif;transition:opacity .15s}
.a-btn:active{opacity:.75}
.a-btn-o{border:1.5px solid var(--T);background:transparent;color:var(--T)}
.a-btn-f{border:none;background:var(--T);color:#fff}
.a-links{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px}
.a-link{padding:12px 16px;border-radius:10px;background:var(--card);border:1px solid var(--brd);font-size:13px;color:var(--T);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:8px;cursor:pointer}
.a-link:active{background:var(--TL)}

/* ── ANNOY PULSE ── */
@keyframes annoyShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.npop.annoy{animation:annoyShake .4s ease}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="hdr-top">
      <span class="logo" id="pgTitle">Все задачи</span>
      <div class="hdr-acts">
        <button class="ico-btn" onclick="toggleSearch()">🔍</button>
        <button class="ico-btn" onclick="shareApp()">⬆️</button>
        <button class="lang-btn" id="lBtn" onclick="toggleLang()">RO</button>
      </div>
    </div>
    <div class="cfilters" id="cfilters"></div>
  </div>
  <div class="search-bar" id="searchBar">
    <input class="s-inp" id="sInp" placeholder="Поиск..." oninput="render()">
  </div>

  <div class="pg on" id="pg0"></div>
  <div class="pg" id="pg1"></div>
  <div class="pg" id="pg2"></div>
  <div class="pg" id="pg3"></div>

  <div class="nav">
    <button class="nb on" id="nb0" onclick="goPage(0)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 17h7M17 14v7"/></svg>
      <span data-i="nav0">Задачи</span>
    </button>
    <button class="nb" id="nb1" onclick="goPage(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span data-i="nav1">Выполнено</span>
    </button>
    <button class="nb" id="nb2" onclick="goPage(2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <span data-i="nav2">Настройки</span>
    </button>
    <button class="nb" id="nb3" onclick="goPage(3)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span data-i="nav3">О нас</span>
    </button>
  </div>

  <div class="fabs">
    <button class="fab-mic" id="fabMic" onclick="startVoice()">
      <span class="fm-ico">🎤</span>
      <span class="fm-lbl">Ok..</span>
    </button>
    <button class="fab-add" onclick="openModal()">＋</button>
  </div>

  <div class="vind" id="vind">
    <span class="vdot"></span>
    <span class="vtxt" id="vtxt">Говорите...</span>
  </div>

  <div class="npop" id="npop">
    <div class="np-hdr">
      <span class="np-app">Окей, Mimory</span>
      <span class="np-time" id="npTime"></span>
    </div>
    <div class="np-body"><div class="np-title" id="npTitle"></div></div>
    <div class="np-btns">
      <button class="np-btn" onclick="snooze()" data-i="later">ПОЗЖЕ</button>
      <button class="np-btn" onclick="transfer()" data-i="transfer">ПЕРЕНОС</button>
      <button class="np-btn" onclick="doneNotif()" data-i="ok">ОК</button>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="closeOut(event)">
    <div class="modal">
      <div class="mhdr">
        <span class="mtitle" id="mtitle">НОВАЯ ЗАДАЧА</span>
        <button class="mclose" onclick="closeModal()">✕</button>
      </div>
      <div class="mbody">
        <div class="done-row" onclick="togModalDone()">
          <div class="done-box" id="doneBox">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><polyline points="1 5 4.5 8.5 11 1"/></svg>
          </div>
          <span class="done-lbl" data-i="task_done">ЗАДАЧА ВЫПОЛНЕНА</span>
        </div>
        <div class="fi"><input id="fN" type="text" placeholder="Название задачи..." autocomplete="off"></div>
        <div class="fi frow">
          <input id="fD" type="date">
          <input id="fT" type="time">
        </div>
        <div class="qbtns">
          <button class="qbtn" onclick="addT(20,'m')">+ 20 МИН</button>
          <button class="qbtn" onclick="addT(1,'h')">+ 1 ЧАС</button>
          <button class="qbtn" onclick="addT(1,'d')">+ 1 ДЕНЬ</button>
          <button class="qbtn" onclick="addT(7,'d')">+ 7 ДН.</button>
        </div>
        <div class="fire" id="fireInfo"></div>
        <div class="rep-row">
          <span class="rep-lbl" data-i="rep_reg">Повторять регулярно</span>
          <div class="tog" id="togRep" onclick="togRepeat()"></div>
        </div>
        <div class="rep-det" id="repDet">
          <span class="rep-lbl2" data-i="every">каждые</span>
          <input class="rs n" id="fRN" type="number" min="1" max="999" value="1">
          <select class="rs" id="fRU">
            <option value="m" data-i="u_m">мин.</option>
            <option value="h" data-i="u_h">ч.</option>
            <option value="d" selected data-i="u_d">дн.</option>
            <option value="w" data-i="u_w">нед.</option>
            <option value="mo" data-i="u_mo">мес.</option>
            <option value="y" data-i="u_y">лет</option>
          </select>
          <span class="rep-lbl2" style="margin-left:4px" data-i="or">или</span>
          <select class="rs" id="fPre" onchange="applyPre()">
            <option value="">—</option>
            <option value="wd" data-i="p_wd">Будни</option>
            <option value="wk" data-i="p_wk">Нед.</option>
            <option value="mo" data-i="p_mo">Мес.</option>
            <option value="yr" data-i="p_yr">Год</option>
          </select>
        </div>
        <div class="cpick" id="cpick"></div>
        <div class="vrow">
          <div class="vrow-l">
            <span class="vrow-lbl" data-i="speak">Произносить голосом</span>
            <div class="tog" id="togV" onclick="togEl(this)"></div>
          </div>
          <button class="mel-btn" onclick="pickMelody()" data-i="melody">МЕЛОДИЯ</button>
        </div>
      </div>

// TIME HELPERS
// ════════════════════════════════════════
const now=()=>new Date();
const tod=()=>{const d=new Date();d.setHours(0,0,0,0);return d;}
const eow=()=>{const d=tod();d.setDate(d.getDate()+(7-d.getDay()));return d;}
const MONTHS_RU=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const MONTHS_RO=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec'];
function fmtDt(iso){
  if(!iso)return t('no_dt');
  const d=new Date(iso),m=lang==='ru'?MONTHS_RU:MONTHS_RO;
  return`${d.getDate()} ${m[d.getMonth()]} в ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
const pad=n=>String(n).padStart(2,'0');
function fireIn(iso){
  if(!iso)return'';
  const diff=new Date(iso)-now();
  if(diff<=0)return'';
  const m=Math.round(diff/60000);
  if(m<60)return`${t('fi_in')} ${m} мин.`;
  const h=Math.floor(m/60);
  if(h<24)return`${t('fi_in')} ${h}ч. ${m%60}мин.`;
  return`${t('fi_in')} ${Math.floor(h/24)}д.`;
}
function isOv(tk){return!tk.done&&tk.dt&&new Date(tk.dt)<now();}
function isTd(tk){if(!tk.dt)return false;const d=new Date(tk.dt),a=tod(),b=new Date(a);b.setDate(b.getDate()+1);return d>=a&&d<b;}
function isWk(tk){if(!tk.dt)return false;const d=new Date(tk.dt);return d>=tod()&&d<eow()&&!isTd(tk);}
function repStr(tk){

  const u={'m':'мин','h':'ч','d':'дн','w':'нед','mo':'мес','y':'лет'};
  return`↻ ${t('every')} ${tk.rn||1} ${u[tk.ru||'d']||'дн'}`;
}

// ════════════════════════════════════════
// SMART PARSER
// ════════════════════════════════════════
function parseText(raw){
  let name=raw.replace(/^(напомни|напоминание|напомнить|remind|reaminteste-mi)\s*/i,'').trim();
  let dt=null;
  const n=new Date();

  const match=(re)=>raw.match(re);
  const hm=match(/через\s+(\d+)\s*(?:часов?|ч\.?)\s+(\d+)\s*(?:минут?|мин)/i);
  const mins=match(/через\s+(\d+)\s*(?:минут?|мин)/i);
  const hrs=match(/через\s+(\d+)\s*(?:часов?|ч\.?)/i);
  const days=match(/через\s+(\d+)\s*(?:дней?|дня?|д\.)/i);
  const tmrw=match(/завтра/i);
  const afttmrw=match(/послезавтра/i);
  const wdMatch=match(/(понедельник|вторник|среду?|четверг|пятниц[уа]|субботу?|воскресенье)/i);
  const atTime=match(/в\s+(\d{1,2})[:\.](\d{2})/i);
  const isMor=match(/утром?/i), isLun=match(/обед/i), isEve=match(/вечером?/i), isNit=match(/ночью?/i);

  if(hm){dt=new Date(n);dt.setHours(dt.getHours()+parseInt(hm[1]));dt.setMinutes(dt.getMinutes()+parseInt(hm[2]));}
  else if(mins){dt=new Date(n);dt.setMinutes(dt.getMinutes()+parseInt(mins[1]));}
  else if(hrs){dt=new Date(n);dt.setHours(dt.getHours()+parseInt(hrs[1]));}
  else if(days){dt=new Date(n);dt.setDate(dt.getDate()+parseInt(days[1]));}
  else if(afttmrw){dt=new Date(n);dt.setDate(dt.getDate()+2);}
  else if(tmrw){dt=new Date(n);dt.setDate(dt.getDate()+1);}
  else if(wdMatch){
    const wd={'понедельник':1,'вторник':2,'среда':3,'среду':3,'четверг':4,'пятница':5,'пятницу':5,'суббота':6,'субботу':6,'воскресенье':0};
    const tg=wd[wdMatch[1].toLowerCase()]??1;
    dt=new Date(n);let df=tg-dt.getDay();if(df<=0)df+=7;dt.setDate(dt.getDate()+df);
  }

  if(dt){
    const setH=(t2)=>{const[h,m]=t2.split(':');dt.setHours(parseInt(h),parseInt(m),0);}
    if(isMor)setH(cfg.mor||'07:30');
    else if(isLun)setH(cfg.lun||'13:00');
    else if(isEve)setH(cfg.eve||'19:00');
    else if(isNit)setH(cfg.nit||'00:30');
  }
  if(atTime){
    if(!dt)dt=new Date(n);
    dt.setHours(parseInt(atTime[1]),parseInt(atTime[2]),0);
    if(dt<n&&!tmrw&&!afttmrw&&!wdMatch)dt.setDate(dt.getDate()+1);
  }

  // Clean name
  [/через\s+\d+\s*(?:часов?|ч\.?)\s+\d+\s*(?:минут?|мин)/i,
   /через\s+\d+\s*(?:минут?|мин)/i,/через\s+\d+\s*(?:часов?|ч\.?)/i,
   /через\s+\d+\s*(?:дней?|дня?|д\.)/i,/послезавтра/i,/завтра/i,
   /в следующий\s+\w+/i,/(в\s+)?(понедельник|вторник|среду?|четверг|пятниц[уа]|субботу?|воскресенье)/i,
   /утром?/i,/обед/i,/вечером?/i,/ночью?/i,/в\s+\d{1,2}[:.]\d{2}/i
  ].forEach(re=>name=name.replace(re,'').trim());
  name=name.replace(/\s{2,}/g,' ').replace(/^[,\s]+|[,\s]+$/g,'').trim()||raw;
  return{name,dt};
}

function sec(lk,list){

function card(tk){

      <div class="tt">${esc(tk.name)}</div>
      <div class="tm"><span class="td2 ${ov?'ov':''}">${fmtDt(tk.dt)}</span><span class="trp">${repStr(tk)}</span></div>

}

function openModal(id){

  else{document.getElementById('fD').value=n2.toISOString().split('T')[0];document.getElementById('fT').value=`${pad(n2.getHours())}:${pad(n2.getMinutes())}`;}
  buildCpick(tk?.col||'c0');

  document.getElementById('cpick').innerHTML=COLS.map(c=>`<div class="co ${sel===c.id?'on':''}" style="background:${c.h}" onclick="pickCol('${c.id}')"></div>`).join('');
}

function getCol(){const e=document.querySelector('.co.on');return e?COLS.find(c=>e.style.background===c.h||e.style.background.includes(c.h.slice(1)))?.id||'c0':'c0';}
function togRepeat(){const e=document.getElementById('togRep');e.classList.toggle('on');document.getElementById('repDet').classList.toggle('on',e.classList.contains('on'));}
function togEl(el){el.classList.toggle('on');}
function setTog(id,v){document.getElementById(id)?.classList.toggle('on',!!v);}
function getTog(id){return document.getElementById(id)?.classList.contains('on');}
function applyPre(){const v=document.getElementById('fPre').value;const m={wd:{u:'d',n:1},wk:{u:'w',n:1},mo:{u:'mo',n:1},yr:{u:'y',n:1}};if(m[v]){document.getElementById('fRU').value=m[v].u;document.getElementById('fRN').value=m[v].n;}}
function addT(n,u){
  const d=getMDt()||new Date();
  if(u==='m')d.setMinutes(d.getMinutes()+n);
  else if(u==='h')d.setHours(d.getHours()+n);
  else if(u==='d')d.setDate(d.getDate()+n);
  document.getElementById('fD').value=d.toISOString().split('T')[0];
  document.getElementById('fT').value=`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  updFire();
}
function getMDt(){const d=document.getElementById('fD').value,t2=document.getElementById('fT').value;return d?new Date(d+'T'+(t2||'00:00')):null;}
function updFire(){const d=getMDt();document.getElementById('fireInfo').textContent=d?fireIn(d.toISOString()):''; }
function pickMelody(){alert(lang==='ru'?'Выбор мелодии — в следующей версии 🎵':'Alegerea melodiei — în versiunea următoare 🎵');}

function saveTask(){
  const name=document.getElementById('fN').value.trim();
  if(!name){document.getElementById('fN').focus();return;}
  const d=document.getElementById('fD').value,ti=document.getElementById('fT').value;
  const dt=d?new Date(d+'T'+(ti||'00:00')).toISOString():null;
  const col=getCol();
  const hasR=getTog('togRep');
  const pv=document.getElementById('fPre').value;
  const rep=hasR?(pv||'custom'):'none';
  const rn=parseInt(document.getElementById('fRN').value)||1;
  const ru=document.getElementById('fRU').value;
  const voice=getTog('togV');
  if(editId){
    const i=tasks.findIndex(t=>t.id===editId);
    if(i>=0)Object.assign(tasks[i],{name,dt,col,rep,rn,ru,voice,done:mDone});
  }else{
    tasks.push({id:uid(),name,dt,col,rep,rn,ru,voice,done:false,ca:new Date().toISOString()});
  }
  persist();closeModal();render();
}
function delTask(){if(!editId)return;tasks=tasks.filter(t=>t.id!==editId);persist();closeModal();render();}
function togDone(id){
  const tk=tasks.find(t=>t.id===id);if(!tk)return;
  tk.done=!tk.done;
  if(tk.done&&tk.rep&&tk.rep!=='none'&&tk.dt){const nx=nextOcc(tk);if(nx)tasks.push({...tk,id:uid(),done:false,dt:nx.toISOString(),ca:new Date().toISOString()});}
  persist();render();
}
function nextOcc(tk){
  const d=new Date(tk.dt);
  const u=tk.ru||'d',n2=tk.rn||1;
  if(tk.rep==='wd'){do{d.setDate(d.getDate()+1);}while(d.getDay()===0||d.getDay()===6);}
  else if(tk.rep==='wk')d.setDate(d.getDate()+7);
  else if(tk.rep==='mo')d.setMonth(d.getMonth()+1);
  else if(tk.rep==='yr')d.setFullYear(d.getFullYear()+1);
  else{if(u==='m')d.setMinutes(d.getMinutes()+n2);else if(u==='h')d.setHours(d.getHours()+n2);else if(u==='d')d.setDate(d.getDate()+n2);else if(u==='w')d.setDate(d.getDate()+n2*7);else if(u==='mo')d.setMonth(d.getMonth()+n2);else if(u==='y')d.setFullYear(d.getFullYear()+n2);}
  return d>now()?d:null;
}

// ════════════════════════════════════════
// NOTIFICATIONS
// ════════════════════════════════════════
function checkRem(){
  if(document.hidden)return;
  tasks.filter(tk=>!tk.done&&tk.dt).forEach(tk=>{
    const diff=new Date(tk.dt)-now();
    if(diff>-60000&&diff<30000&&npTaskId!==tk.id){
      npTaskId=tk.id; showNpop(tk);
    }
  });
}
function showNpop(tk){
  document.getElementById('npTitle').textContent=tk.name;
  document.getElementById('npTime').textContent=tk.dt?`${pad(new Date(tk.dt).getHours())}:${pad(new Date(tk.dt).getMinutes())}`:'' ;
  const np=document.getElementById('npop');
  np.classList.add('on');
  if(Notification.permission==='granted')new Notification('Mimory',{body:tk.name,icon:'icon-192.png',tag:tk.id});
  if(cfg.vibro&&navigator.vibrate)navigator.vibrate([300,100,300]);
  if(cfg.annoy){clearInterval(annoyTimer);let cnt=0;annoyTimer=setInterval(()=>{if(++cnt>5||!np.classList.contains('on')){clearInterval(annoyTimer);return;}np.classList.add('annoy');setTimeout(()=>np.classList.remove('annoy'),400);if(cfg.vibro&&navigator.vibrate)navigator.vibrate([200,100,200]);},60000);}
  else setTimeout(()=>{np.classList.remove('on');npTaskId=null;},12000);
}
function doneNotif(){if(npTaskId)togDone(npTaskId);hideNpop();}
function snooze(){if(npTaskId){const tk=tasks.find(t=>t.id===npTaskId);if(tk){const d=new Date();d.setMinutes(d.getMinutes()+10);tk.dt=d.toISOString();persist();render();}}hideNpop();}
function transfer(){if(npTaskId){const tk=tasks.find(t=>t.id===npTaskId);if(tk){const d=new Date();d.setDate(d.getDate()+1);tk.dt=d.toISOString();persist();render();}}hideNpop();}
function hideNpop(){clearInterval(annoyTimer);document.getElementById('npop').classList.remove('on');npTaskId=null;}

// ════════════════════════════════════════
// VOICE
// ════════════════════════════════════════
let recog=null;
function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert(t('v_no'));return;}
  if(recog){recog.stop();return;}
  recog=new SR();recog.lang=lang==='ru'?'ru-RU':'ro-RO';
  recog.onstart=()=>{document.getElementById('fabMic').classList.add('rec');document.getElementById('vind').classList.add('on');document.getElementById('vtxt').textContent=t('v_go');};
  recog.onresult=e=>{
    const raw=e.results[0][0].transcript;
    const p=parseText(raw);
    openModal();
    setTimeout(()=>{
      document.getElementById('fN').value=p.name;
      if(p.dt){document.getElementById('fD').value=p.dt.toISOString().split('T')[0];document.getElementById('fT').value=`${pad(p.dt.getHours())}:${pad(p.dt.getMinutes())}`;updFire();}
    },320);
  };
  recog.onerror=recog.onend=()=>{document.getElementById('fabMic').classList.remove('rec');document.getElementById('vind').classList.remove('on');recog=null;};
  recog.start();
}

// ════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════
function expData(){
  const b=new Blob([JSON.stringify({v:'2.0',tasks,cfg},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`mimory_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function impData(){
  const i=document.createElement('input');i.type='file';i.accept='.json';
  i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tasks){tasks=d.tasks;if(d.cfg)Object.assign(cfg,d.cfg);persist();persistCfg();render();alert(t('imp_ok'));}}catch{alert('Ошибка файла');}};
    r.readAsText(f);};i.click();
}

// ════════════════════════════════════════
// SERVICE WORKER & PWA
// ════════════════════════════════════════
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
  navigator.serviceWorker.addEventListener('message',e=>{
    if(e.data?.action==='done'&&e.data.taskId)togDone(e.data.taskId);
    if(e.data?.action==='snooze'&&e.data.taskId){const tk=tasks.find(t=>t.id===e.data.taskId);if(tk){const d=new Date();d.setMinutes(d.getMinutes()+10);tk.dt=d.toISOString();persist();render();}}
  });
}

if(Notification.permission==='default')setTimeout(()=>Notification.requestPermission(),4000);
</script>
